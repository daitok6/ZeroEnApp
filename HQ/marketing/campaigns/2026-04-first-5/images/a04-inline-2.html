<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=IBM+Plex+Mono:wght@400;600&family=Murecho:wght@500;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 800px; height: 450px;
    background: #0D0D0D;
    font-family: 'IBM Plex Mono', monospace;
    color: #F4F4F2;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .wrap { width: 720px; }
  .title {
    font-family: 'Syne', sans-serif; font-weight: 800;
    font-size: 16px; color: #F4F4F2; margin-bottom: 8px;
  }
  .subtitle {
    font-family: 'Murecho', 'Hiragino Sans', sans-serif;
    font-size: 12px; color: #555; margin-bottom: 24px;
  }
  .chart-wrap {
    display: flex; gap: 8px; align-items: stretch; margin-top: 4px;
  }
  .y-labels {
    display: flex; flex-direction: column; justify-content: space-between;
    padding-bottom: 22px; padding-top: 4px;
    font-size: 10px; color: #444; text-align: right; min-width: 36px;
  }
  .chart-right { flex: 1; display: flex; flex-direction: column; }
  .chart-area {
    position: relative; height: 240px;
    border-left: 1px solid #2A2A2A; border-bottom: 1px solid #2A2A2A;
  }
  .x-labels {
    display: flex; justify-content: space-between;
    font-size: 10px; color: #444; padding-top: 6px;
  }
  .dot {
    position: absolute; border-radius: 50%;
    transform: translate(-50%, 50%);
  }
  .dot-label {
    position: absolute; font-size: 11px; white-space: nowrap;
    font-family: 'Murecho', 'Hiragino Sans', sans-serif;
    transform: translateY(50%);
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="title">ポジショニング — 初期コスト × 納品スピード</div>
  <div class="subtitle">ZeroEnはコーチ・セラピスト向けに唯一空いているポジションにいる</div>
  <div class="chart-wrap">
    <div class="y-labels">
      <span>速い ↑</span>
      <span>遅い</span>
    </div>
    <div class="chart-right">
      <div class="chart-area">
        <!-- ZeroEn: low cost, very fast -->
        <div class="dot" style="background:#00E87A;width:16px;height:16px;left:8%;bottom:88%;box-shadow:0 0 10px #00E87A88;"></div>
        <div class="dot-label" style="color:#00E87A;font-weight:700;font-family:'Syne',sans-serif;font-size:12px;left:calc(8% + 12px);bottom:88%;">ZeroEn　← 空白地帯</div>

        <!-- Peraichi: low cost, medium -->
        <div class="dot" style="background:#555;width:12px;height:12px;left:7%;bottom:48%;"></div>
        <div class="dot-label" style="color:#666;left:calc(7% + 16px);bottom:48%;">ペライチ</div>

        <!-- STUDIO: low cost, medium-low -->
        <div class="dot" style="background:#666;width:12px;height:12px;left:10%;bottom:38%;"></div>
        <div class="dot-label" style="color:#777;left:calc(10% + 16px);bottom:38%;">STUDIO</div>

        <!-- Coconala: mid cost, slow -->
        <div class="dot" style="background:#555;width:12px;height:12px;left:48%;bottom:18%;"></div>
        <div class="dot-label" style="color:#666;left:calc(48% + 16px);bottom:18%;">Coconalaフリーランス</div>

        <!-- Agency: high cost, very slow -->
        <div class="dot" style="background:#444;width:12px;height:12px;left:82%;bottom:6%;"></div>
        <div class="dot-label" style="color:#555;left:calc(82% - 52px);bottom:6%;">制作会社</div>
      </div>
      <div class="x-labels">
        <span>低コスト（¥0〜）</span>
        <span>高コスト（¥200k〜）→</span>
      </div>
    </div>
  </div>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=IBM+Plex+Mono:wght@400;600&family=Murecho:wght@500;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 630px;
    background: #0D0D0D;
    font-family: 'IBM Plex Mono', monospace;
    color: #F4F4F2;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .wrap { width: 1100px; display: flex; gap: 80px; align-items: center; }
  .left { flex: 1; }
  .eyebrow {
    font-size: 11px; letter-spacing: 0.18em; color: #00E87A;
    text-transform: uppercase; margin-bottom: 20px;
  }
  .title {
    font-family: 'Syne', sans-serif; font-weight: 800;
    font-size: 44px; line-height: 1.15; color: #F4F4F2;
    letter-spacing: -1px; margin-bottom: 24px;
  }
  .price {
    display: inline-block;
    font-size: 60px; font-weight: 800; color: #00E87A;
    letter-spacing: -2px;
  }
  .price-unit { font-size: 18px; color: #555; margin-left: 4px; }
  .desc {
    font-family: 'Murecho', 'Hiragino Sans', sans-serif;
    font-size: 14px; color: #666; line-height: 1.7; margin-top: 12px;
  }
  .right { width: 380px; }
  .checklist { display: flex; flex-direction: column; gap: 10px; }
  .check-item {
    display: flex; align-items: center; gap: 14px;
    padding: 13px 16px; border-radius: 4px;
    background: #111; border: 1px solid #1E1E1E;
  }
  .check-icon {
    width: 22px; height: 22px; border-radius: 50%;
    background: #00E87A; display: flex; align-items: center;
    justify-content: center; flex-shrink: 0;
    font-size: 12px; color: #0D0D0D; font-weight: 700;
  }
  .check-text {
    font-family: 'Murecho', 'Hiragino Sans', sans-serif;
    font-size: 13px; color: #CCC;
  }
  .section-label {
    font-size: 10px; letter-spacing: 0.15em; color: #444;
    text-transform: uppercase; margin-bottom: 10px;
  }
  .footer {
    position: absolute; bottom: 28px; right: 48px;
    font-size: 11px; color: #444;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="left">
    <div class="eyebrow">サービス内容のご説明</div>
    <div class="title">月<span class="price">¥5,000</span><span class="price-unit">/月</span><br>で何をお届けするか、<br>丁寧にご説明します</div>
    <div class="desc">
      ご不安な点もあるかと思います。<br>
      安心してお使いいただけるよう、<br>すべてお伝えします。
    </div>
  </div>
  <div class="right">
    <div class="section-label">含まれるもの</div>
    <div class="checklist">
      <div class="check-item">
        <div class="check-icon">✓</div>
        <div class="check-text">Vercel ホスティング（独自ドメイン込み）</div>
      </div>
      <div class="check-item">
        <div class="check-icon">✓</div>
        <div class="check-text">月1回の軽微な更新（テキスト・画像）</div>
      </div>
      <div class="check-item">
        <div class="check-icon">✓</div>
        <div class="check-text">セキュリティ・パフォーマンス管理</div>
      </div>
      <div class="check-item">
        <div class="check-icon">✓</div>
        <div class="check-text">問い合わせフォーム稼働確認</div>
      </div>
      <div class="check-item">
        <div class="check-icon">✓</div>
        <div class="check-text">月次パフォーマンスレポート PDF</div>
      </div>
    </div>
  </div>
</div>
<div class="footer">zeroen.dev</div>
</body>
</html>

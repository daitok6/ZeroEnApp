<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=IBM+Plex+Mono:wght@400;600&family=Murecho:wght@500;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 900px;
    background: #0D0D0D;
    font-family: 'IBM Plex Mono', monospace;
    color: #F4F4F2;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .wrap { width: 1100px; }
  .label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; letter-spacing: 0.18em; color: #00E87A;
    text-transform: uppercase; margin-bottom: 12px; text-align: center;
  }
  .title {
    font-family: 'Murecho', 'Hiragino Sans', sans-serif; font-weight: 700;
    font-size: 30px; color: #F4F4F2; margin-bottom: 36px;
    text-align: center; letter-spacing: -0.01em;
  }
  .table {
    width: 100%; border-collapse: collapse;
    border: 1px solid rgba(244,244,242,0.14);
    border-radius: 6px; overflow: hidden;
  }
  th, td {
    padding: 16px 14px;
    border-right: 1px solid rgba(244,244,242,0.1);
    border-bottom: 1px solid rgba(244,244,242,0.1);
    font-size: 13px; line-height: 1.5;
    text-align: center;
    vertical-align: middle;
  }
  th:last-child, td:last-child { border-right: none; }
  tr:last-child td { border-bottom: none; }

  thead th {
    background: #141414;
    font-family: 'Syne', sans-serif; font-weight: 700;
    font-size: 14px; color: #BBB;
    letter-spacing: 0.02em;
    padding: 18px 14px;
  }
  thead th.zeroen {
    color: #00E87A;
    background: #0F1A13;
  }
  thead th.row-head { background: #141414; color: #777; font-family: 'IBM Plex Mono', monospace; font-weight: 600; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; }

  tbody td {
    font-family: 'Murecho', 'Hiragino Sans', sans-serif; font-weight: 500;
    color: #CCC;
  }
  tbody td.row-head {
    font-family: 'IBM Plex Mono', monospace; font-weight: 600;
    font-size: 11px; color: #888;
    letter-spacing: 0.1em; text-transform: uppercase;
    text-align: left;
    background: #101010;
    padding-left: 20px;
    width: 190px;
  }
  tbody td.zeroen {
    background: #0B1510;
    color: #E8FFE8;
  }
  tbody td.mono {
    font-family: 'IBM Plex Mono', monospace; font-weight: 400;
    font-size: 12px; color: #BBB;
  }
  tbody td.zeroen.mono { color: #00E87A; }

  .note {
    margin-top: 20px; text-align: right;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; color: #555;
    letter-spacing: 0.04em;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="label">COMPARISON TABLE</div>
  <div class="title">乗り換え先 5サービス比較</div>
  <table class="table">
    <thead>
      <tr>
        <th class="row-head"></th>
        <th>ペライチ</th>
        <th>STUDIO</th>
        <th>Wix</th>
        <th>WordPress</th>
        <th class="zeroen">ZeroEn</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td class="row-head">制作スタイル</td>
        <td>テンプレ編集</td>
        <td>ノーコード</td>
        <td>テンプレ＋編集</td>
        <td>テーマ＋コード</td>
        <td class="zeroen">コードベース</td>
      </tr>
      <tr>
        <td class="row-head">デザイン自由度</td>
        <td class="mono">△</td>
        <td class="mono">◎</td>
        <td class="mono">○</td>
        <td class="mono">◎</td>
        <td class="zeroen mono">◎</td>
      </tr>
      <tr>
        <td class="row-head">自分で更新する時間</td>
        <td>少なめで可</td>
        <td>やや必要</td>
        <td>やや必要</td>
        <td>多く必要</td>
        <td class="zeroen">ほぼ不要</td>
      </tr>
      <tr>
        <td class="row-head">月額費用の目安</td>
        <td class="mono">¥1,465〜</td>
        <td class="mono">¥0〜¥4,980</td>
        <td class="mono">¥1,200〜</td>
        <td class="mono">サーバー別</td>
        <td class="zeroen mono">¥5,000〜</td>
      </tr>
      <tr>
        <td class="row-head">SEO・長期運用</td>
        <td class="mono">△</td>
        <td class="mono">○</td>
        <td class="mono">○</td>
        <td class="mono">◎</td>
        <td class="zeroen mono">◎</td>
      </tr>
      <tr>
        <td class="row-head">向いている人</td>
        <td>はじめて作る方</td>
        <td>デザイン重視</td>
        <td>機能を広く使う</td>
        <td>ブログ中心</td>
        <td class="zeroen">任せたい方</td>
      </tr>
    </tbody>
  </table>
  <div class="note">※ 2026年4月時点の公開情報を基にした目安です</div>
</div>
</body>
</html>

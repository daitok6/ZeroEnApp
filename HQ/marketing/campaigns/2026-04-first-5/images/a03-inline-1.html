<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=IBM+Plex+Mono:wght@400;600&family=Murecho:wght@500;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 800px; height: 450px;
    background: #0D0D0D;
    font-family: 'IBM Plex Mono', monospace;
    color: #F4F4F2;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .wrap { width: 720px; }
  .header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 20px; }
  .header-title {
    font-family: 'Syne', sans-serif; font-weight: 800;
    font-size: 17px; color: #F4F4F2;
  }
  .tier {
    display: flex; gap: 8px;
  }
  .tier-badge {
    padding: 3px 10px; border-radius: 20px; font-size: 11px;
  }
  .tier-badge.basic { background: #1A1A1A; color: #888; border: 1px solid #333; }
  .tier-badge.premium { background: #00E87A22; color: #00E87A; border: 1px solid #00E87A44; }
  .table { border: 1px solid #1E1E1E; border-radius: 4px; overflow: hidden; }
  .row {
    display: grid; grid-template-columns: 1fr 90px 90px;
    border-bottom: 1px solid #1A1A1A;
  }
  .row:last-child { border-bottom: none; }
  .row.head { background: #141414; }
  .cell {
    padding: 12px 16px;
    font-family: 'Murecho', 'Hiragino Sans', sans-serif;
    font-size: 12px; color: #AAA;
    display: flex; align-items: center;
  }
  .cell.head-cell {
    font-size: 11px; color: #555; letter-spacing: 0.08em;
    font-family: 'IBM Plex Mono', monospace;
  }
  .cell.center { justify-content: center; text-align: center; border-left: 1px solid #1A1A1A; }
  .check-y { color: #00E87A; font-size: 16px; }
  .check-n { color: #333; font-size: 16px; }
  .feature-label { color: #CCC; }
  .premium-col { background: #0D1A12; }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="header-title">月額プランに含まれるもの</div>
    <div class="tier">
      <div class="tier-badge basic">Basic ¥5,000</div>
      <div class="tier-badge premium">Premium ¥10,000</div>
    </div>
  </div>
  <div class="table">
    <div class="row head">
      <div class="cell head-cell">サービス内容</div>
      <div class="cell head-cell center">Basic</div>
      <div class="cell head-cell center">Premium</div>
    </div>
    <div class="row">
      <div class="cell feature-label">Vercelホスティング（独自ドメイン）</div>
      <div class="cell center"><span class="check-y">✓</span></div>
      <div class="cell center premium-col"><span class="check-y">✓</span></div>
    </div>
    <div class="row">
      <div class="cell feature-label">月1回の軽微な更新（テキスト・画像）</div>
      <div class="cell center"><span class="check-y">✓</span></div>
      <div class="cell center premium-col"><span class="check-y">✓ ×2</span></div>
    </div>
    <div class="row">
      <div class="cell feature-label">セキュリティ・パフォーマンス管理</div>
      <div class="cell center"><span class="check-y">✓</span></div>
      <div class="cell center premium-col"><span class="check-y">✓</span></div>
    </div>
    <div class="row">
      <div class="cell feature-label">月次パフォーマンスレポート PDF</div>
      <div class="cell center" style="color:#888; font-size:11px;">先月分</div>
      <div class="cell center premium-col" style="color:#00E87A; font-size:11px;">年間ダッシュボード</div>
    </div>
    <div class="row">
      <div class="cell feature-label">SEO・セキュリティ監査（WebMori）</div>
      <div class="cell center"><span class="check-n">—</span></div>
      <div class="cell center premium-col" style="color:#00E87A; font-size:11px;">四半期ごと</div>
    </div>
  </div>
</div>
</body>
</html>

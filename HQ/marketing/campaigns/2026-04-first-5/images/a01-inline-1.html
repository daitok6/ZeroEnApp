<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=IBM+Plex+Mono:wght@400;600&family=Murecho:wght@500;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 800px; height: 450px;
    background: #0D0D0D;
    font-family: 'IBM Plex Mono', monospace;
    color: #F4F4F2;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .wrap { width: 720px; }
  .label {
    font-size: 11px; letter-spacing: 0.16em; color: #555;
    text-transform: uppercase; margin-bottom: 24px; text-align: center;
  }
  .table { display: flex; gap: 0; }
  .col { flex: 1; }
  .col-head {
    font-family: 'Syne', sans-serif; font-weight: 800;
    font-size: 15px; padding: 10px 20px; text-align: center;
    border-radius: 4px 4px 0 0;
  }
  .col-head.before { background: #1A1A1A; color: #666; }
  .col-head.after { background: #00E87A; color: #0D0D0D; }
  .rows { border: 1px solid #222; border-top: none; }
  .rows.after { border-color: #00E87A44; }
  .row {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 12px 18px; border-bottom: 1px solid #1E1E1E;
    font-family: 'Murecho', 'Hiragino Sans', sans-serif;
    font-size: 13px; color: #AAA; line-height: 1.5;
  }
  .rows.after .row { color: #E0E0E0; border-color: #1A2A1A; }
  .row:last-child { border-bottom: none; }
  .icon { font-size: 15px; margin-top: 1px; }
  .divider-col {
    width: 40px; display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif; font-size: 18px; color: #333;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="label">従来の選択肢 → ZeroEn</div>
  <div class="table">
    <div class="col">
      <div class="col-head before">今まで</div>
      <div class="rows">
        <div class="row"><span class="icon">✗</span> 初期費用20〜50万円</div>
        <div class="row"><span class="icon">✗</span> 納品まで1〜3ヶ月待ち</div>
        <div class="row"><span class="icon">✗</span> 更新のたびに見積もり</div>
        <div class="row"><span class="icon">✗</span> ホスティングは別途契約</div>
        <div class="row"><span class="icon">✗</span> 担当者が途中でいなくなる</div>
      </div>
    </div>
    <div class="divider-col">→</div>
    <div class="col">
      <div class="col-head after">ZeroEn</div>
      <div class="rows after">
        <div class="row"><span class="icon" style="color:#00E87A">✓</span> 初期費用¥0、月¥5,000〜</div>
        <div class="row"><span class="icon" style="color:#00E87A">✓</span> ヒアリング後3営業日で公開</div>
        <div class="row"><span class="icon" style="color:#00E87A">✓</span> 月1回の更新が月額に込み</div>
        <div class="row"><span class="icon" style="color:#00E87A">✓</span> Vercelホスティング込み</div>
        <div class="row"><span class="icon" style="color:#00E87A">✓</span> Stripe請求＋実名運営</div>
      </div>
    </div>
  </div>
</div>
</body>
</html>

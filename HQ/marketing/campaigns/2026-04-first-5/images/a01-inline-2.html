<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=IBM+Plex+Mono:wght@400;600&family=Murecho:wght@500;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 800px; height: 450px;
    background: #0D0D0D;
    font-family: 'IBM Plex Mono', monospace;
    color: #F4F4F2;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .wrap { width: 720px; }
  .title {
    font-family: 'Syne', sans-serif; font-weight: 800;
    font-size: 20px; color: #F4F4F2; margin-bottom: 28px; text-align: center;
  }
  .title span { color: #00E87A; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .card {
    background: #111; border: 1px solid #222;
    border-top: 3px solid #00E87A;
    padding: 18px 20px; border-radius: 4px;
  }
  .card-num {
    font-family: 'IBM Plex Mono', monospace; font-weight: 600;
    font-size: 26px; color: #00E87A; line-height: 1.2; margin-bottom: 8px;
    letter-spacing: -0.02em;
  }
  .card-title {
    font-family: 'Murecho', 'Hiragino Sans', sans-serif;
    font-size: 14px; font-weight: 700; color: #F4F4F2; margin-bottom: 4px;
  }
  .card-desc {
    font-family: 'Murecho', 'Hiragino Sans', sans-serif;
    font-size: 11px; color: #666; line-height: 1.5;
  }
  .card.wide {
    grid-column: 1 / -1;
    display: flex; gap: 24px; align-items: center;
    border-top-color: #F4F4F2;
  }
  .card.wide .card-num { font-size: 22px; color: #F4F4F2; min-width: 44px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="title">ZeroEnが解決する<span>5つのこと</span></div>
  <div class="grid">
    <div class="card">
      <div class="card-num">¥0</div>
      <div class="card-title">初期費用ゼロ</div>
      <div class="card-desc">制作費はZeroEnが負担。<br>月¥5,000から始められる。</div>
    </div>
    <div class="card">
      <div class="card-num">3日</div>
      <div class="card-title">最短3営業日で公開</div>
      <div class="card-desc">テンプレートではなく<br>カスタムNext.jsビルド。</div>
    </div>
    <div class="card">
      <div class="card-num">月1</div>
      <div class="card-title">更新が月額込み</div>
      <div class="card-desc">テキスト・画像の変更は<br>追加料金なし。</div>
    </div>
    <div class="card">
      <div class="card-num">SP</div>
      <div class="card-title">モバイルファースト設計</div>
      <div class="card-desc">スマホ80%の集客に<br>最初から最適化。</div>
    </div>
    <div class="card wide">
      <div class="card-num">実名</div>
      <div style="flex:1">
        <div class="card-title">元日立・元楽天エンジニアが担当</div>
        <div class="card-desc">Stripe請求・契約書・実名運営。毎月レポートが届かなければ返金対応。</div>
      </div>
    </div>
  </div>
</div>
</body>
</html>

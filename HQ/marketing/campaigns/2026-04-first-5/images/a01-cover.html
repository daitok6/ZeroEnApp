<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=IBM+Plex+Mono:wght@400;600&family=Murecho:wght@500;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 630px;
    background: #0D0D0D;
    font-family: 'IBM Plex Mono', monospace;
    color: #F4F4F2;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .wrap { width: 1100px; display: flex; gap: 64px; align-items: center; }
  .left { flex: 1; }
  .eyebrow {
    font-size: 11px; letter-spacing: 0.18em; color: #00E87A;
    text-transform: uppercase; margin-bottom: 20px;
  }
  .title {
    font-family: 'Syne', sans-serif; font-weight: 800;
    font-size: 42px; line-height: 1.15; color: #F4F4F2;
    letter-spacing: -1px; margin-bottom: 28px;
  }
  .title span { color: #00E87A; }
  .subtitle {
    font-size: 14px; color: #888; line-height: 1.6;
  }
  .right { width: 380px; }
  .pain-list { display: flex; flex-direction: column; gap: 12px; }
  .pain-item {
    display: flex; align-items: flex-start; gap: 14px;
    background: #161616; border: 1px solid #222;
    border-left: 3px solid #00E87A;
    padding: 12px 16px; border-radius: 4px;
  }
  .num {
    font-family: 'IBM Plex Mono', monospace; font-weight: 600;
    font-size: 16px; color: #00E87A; min-width: 28px;
    line-height: 1.5; letter-spacing: 0.02em;
  }
  .pain-text {
    font-family: 'Murecho', 'Hiragino Sans', sans-serif;
    font-size: 13px; color: #CCC; line-height: 1.5;
  }
  .footer {
    position: absolute; bottom: 28px; right: 48px;
    font-size: 11px; color: #444;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="left">
    <div class="eyebrow">コーチ・セラピスト向け</div>
    <div class="title">LPで<span>5つの失敗</span>を<br>していませんか</div>
    <div class="subtitle">
      ペライチ・フリーランス・制作会社…<br>
      どれも「合わない」と感じた方へ。
    </div>
  </div>
  <div class="right">
    <div class="pain-list">
      <div class="pain-item">
        <div class="num">01</div>
        <div class="pain-text">ペライチで3週末使っても<br>完成しなかった</div>
      </div>
      <div class="pain-item">
        <div class="num">02</div>
        <div class="pain-text">制作会社の見積もりが<br>20〜50万円で断念した</div>
      </div>
      <div class="pain-item">
        <div class="num">03</div>
        <div class="pain-text">フリーランスに頼んだら<br>音信不通になった</div>
      </div>
      <div class="pain-item">
        <div class="num">04</div>
        <div class="pain-text">スマホで見たら<br>レイアウトが崩れていた</div>
      </div>
      <div class="pain-item">
        <div class="num">05</div>
        <div class="pain-text">更新のたびに<br>追加料金を請求された</div>
      </div>
    </div>
  </div>
</div>
<div class="footer">zeroen.dev</div>
</body>
</html>

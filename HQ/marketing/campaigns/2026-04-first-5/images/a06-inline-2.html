<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=IBM+Plex+Mono:wght@400;600&family=Murecho:wght@500;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 900px;
    background: #0D0D0D;
    font-family: 'IBM Plex Mono', monospace;
    color: #F4F4F2;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .wrap { width: 780px; }
  .label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; letter-spacing: 0.18em; color: #00E87A;
    text-transform: uppercase; margin-bottom: 10px; text-align: center;
  }
  .title {
    font-family: 'Murecho', 'Hiragino Sans', sans-serif; font-weight: 700;
    font-size: 26px; color: #F4F4F2; margin-bottom: 28px;
    text-align: center; letter-spacing: -0.01em;
  }
  .flow { display: flex; flex-direction: column; gap: 0; }
  .step {
    display: flex; align-items: flex-start; gap: 18px;
    background: #111; border: 1px solid #242424;
    border-radius: 6px; padding: 16px 22px;
    position: relative;
  }
  .num {
    font-family: 'IBM Plex Mono', monospace; font-weight: 600;
    font-size: 12px;
    background: #00E87A; color: #0D0D0D;
    padding: 3px 10px; border-radius: 3px;
    letter-spacing: 0.04em;
    min-width: 36px; text-align: center;
    margin-top: 2px;
  }
  .copy { flex: 1; }
  .head {
    font-family: 'Murecho', 'Hiragino Sans', sans-serif; font-weight: 700;
    font-size: 17px; color: #F4F4F2; line-height: 1.3;
    margin-bottom: 4px;
  }
  .sub {
    font-family: 'Murecho', 'Hiragino Sans', sans-serif; font-weight: 500;
    font-size: 12px; color: #888; line-height: 1.4;
  }
  .arrow {
    text-align: center; font-size: 16px; color: #333;
    padding: 6px 0; line-height: 1;
  }
  .warning {
    margin-top: 16px;
    border: 1.5px solid #00E87A;
    background: #00E87A08;
    border-radius: 6px;
    padding: 16px 22px;
    display: flex; align-items: center; gap: 16px;
  }
  .warn-tag {
    font-family: 'IBM Plex Mono', monospace; font-weight: 600;
    font-size: 10px; letter-spacing: 0.16em;
    color: #00E87A;
    border: 1px solid #00E87A44;
    padding: 4px 10px; border-radius: 3px;
    text-transform: uppercase;
    flex-shrink: 0;
  }
  .warn-text {
    font-family: 'Murecho', 'Hiragino Sans', sans-serif; font-weight: 700;
    font-size: 15px; color: #E8FFE8; line-height: 1.5;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="label">MIGRATION FLOW</div>
  <div class="title">ペライチからの乗り換え 5ステップ</div>

  <div class="flow">
    <div class="step">
      <div class="num">01</div>
      <div class="copy">
        <div class="head">解約前チェック</div>
        <div class="sub">URL・画像・本文を保存</div>
      </div>
    </div>
    <div class="arrow">↓</div>
    <div class="step">
      <div class="num">02</div>
      <div class="copy">
        <div class="head">移行先を決定</div>
        <div class="sub">時間 / 自由度 / 費用で絞る</div>
      </div>
    </div>
    <div class="arrow">↓</div>
    <div class="step">
      <div class="num">03</div>
      <div class="copy">
        <div class="head">データをエクスポート</div>
        <div class="sub">画像とテキストをローカル保存</div>
      </div>
    </div>
    <div class="arrow">↓</div>
    <div class="step">
      <div class="num">04</div>
      <div class="copy">
        <div class="head">新サイトを公開</div>
        <div class="sub">スマホ・PC両方で動作確認</div>
      </div>
    </div>
    <div class="arrow">↓</div>
    <div class="step">
      <div class="num">05</div>
      <div class="copy">
        <div class="head">ペライチを解約</div>
        <div class="sub">DNS切替完了後</div>
      </div>
    </div>
  </div>

  <div class="warning">
    <div class="warn-tag">Caution</div>
    <div class="warn-text">先に解約しないこと。公開 → 確認 → 解約の順で。</div>
  </div>
</div>
</body>
</html>

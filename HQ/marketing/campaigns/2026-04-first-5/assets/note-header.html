<!DOCTYPE html>
<html lang="ja"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@700&family=Murecho:wght@500;700&display=block" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:#0D0D0D;width:1500px;height:500px;overflow:hidden}
  body{display:flex;align-items:center;justify-content:space-between;padding:0 100px}
  .left{display:flex;flex-direction:column;gap:16px}
  .wordmark{font-family:'DM Sans',sans-serif;font-weight:700;color:#00E87A;font-size:80px;letter-spacing:0.04em;line-height:1}
  .tagline{font-family:'Murecho','Hiragino Sans',sans-serif;font-weight:500;font-size:22px;color:#F4F4F2;opacity:0.6;letter-spacing:0.04em}
  .right{display:flex;flex-direction:column;align-items:flex-end;gap:12px}
  .badge{border:1px solid rgba(0,232,122,0.4);border-radius:999px;padding:8px 20px;font-family:'Murecho','Hiragino Sans',sans-serif;font-size:18px;color:#00E87A;font-weight:700;letter-spacing:0.06em}
  .url{font-family:'DM Sans',sans-serif;font-weight:700;font-size:26px;color:rgba(244,244,242,0.35);letter-spacing:0.04em}
  .divider{width:1px;height:200px;background:rgba(244,244,242,0.08);flex-shrink:0;margin:0 80px}
</style></head>
<body>
  <div class="left">
    <div class="wordmark">ZeroEn</div>
    <div class="tagline">個人事業主のためのLP制作・ホスティングサービス</div>
  </div>
  <div class="divider"></div>
  <div class="right">
    <div class="badge">先着5名・受付中</div>
    <div class="url">zeroen.dev</div>
  </div>
</body></html>

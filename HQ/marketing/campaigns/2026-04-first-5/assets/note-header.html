<!DOCTYPE html>
<html lang="ja"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@700&family=Murecho:wght@500;700&display=block" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:#0D0D0D;width:3000px;height:600px;overflow:hidden}
  .spacer{height:200px;background:#0D0D0D}
  .inner{padding:0 160px;display:flex;align-items:flex-start;justify-content:space-between}
  .left{display:flex;flex-direction:column;gap:14px}
  .wordmark{font-family:'DM Sans',sans-serif;font-weight:700;color:#00E87A;font-size:110px;letter-spacing:0.04em;line-height:1}
  .tagline{font-family:'Murecho','Hiragino Sans',sans-serif;font-weight:500;font-size:34px;color:#F4F4F2;opacity:0.55;letter-spacing:0.06em}
  .right{display:flex;flex-direction:column;align-items:flex-end;gap:16px;padding-top:10px}
  .badge{border:2px solid rgba(0,232,122,0.4);border-radius:999px;padding:16px 44px;font-family:'Murecho','Hiragino Sans',sans-serif;font-size:32px;color:#00E87A;font-weight:700;letter-spacing:0.08em}
  .url{font-family:'DM Sans',sans-serif;font-weight:700;font-size:36px;color:rgba(244,244,242,0.3);letter-spacing:0.04em}
</style></head>
<body>
  <div class="spacer"></div>
  <div class="inner">
    <div class="left">
      <div class="wordmark">ZeroEn</div>
      <div class="tagline">個人事業主のためのLP制作・ホスティングサービス</div>
    </div>
    <div class="right">
      <div class="badge">先着5名・受付中</div>
      <div class="url">zeroen.dev</div>
    </div>
  </div>
</body></html>

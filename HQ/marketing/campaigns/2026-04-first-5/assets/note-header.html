<!DOCTYPE html>

<style>

  .badge{border:1px solid rgba(0,232,122,0.35);border-radius:999px;padding:10px 28px;font-family:'Murecho','Hiragino Sans',sans-serif;font-size:20px;color:#00E87A;font-weight:700;letter-spacing:0.08em}

<body>
  <div class="wordmark">ZeroEn</div>
  <div class="tagline">個人事業主のためのLP制作・ホスティングサービス</div>

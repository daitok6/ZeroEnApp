<!DOCTYPE html>
<html lang="ja"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Murecho:wght@500;700;800&family=DM+Sans:wght@600;700&family=IBM+Plex+Mono:wght@500&display=block" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:#0D0D0D;width:1200px;height:900px;overflow:hidden;
    font-family:'Murecho','Hiragino Sans',sans-serif;color:#F4F4F2}
  body{display:flex;flex-direction:column;justify-content:space-between;padding:80px}
  .eyebrow{font-size:26px;color:#00E87A;font-weight:700;letter-spacing:0.08em;margin-bottom:16px}
  .h1{font-size:64px;font-weight:800;line-height:1.1}
  .browser{background:#1a1a1a;border-radius:14px;overflow:hidden;border:1px solid rgba(244,244,242,0.12)}
  .browser-bar{display:flex;align-items:center;padding:14px 20px;background:#222;gap:8px}
  .dot{width:11px;height:11px;border-radius:50%}
  .r{background:#ff5f56}.y{background:#ffbd2e}.g{background:#27c93f}
  .url{font-family:'IBM Plex Mono',monospace;font-size:16px;opacity:0.6;margin-left:20px}
  .browser-body{padding:48px 56px 56px;background:#0D0D0D}
  .mock-tag{display:inline-block;padding:6px 14px;border:1px solid #00E87A;color:#00E87A;
    font-size:14px;border-radius:999px;font-weight:600;margin-bottom:18px}
  .mock-h{font-size:48px;font-weight:800;line-height:1.05}
  .mock-h .a{color:#00E87A}
  .mock-sub{font-size:18px;opacity:0.7;margin-top:14px;max-width:560px;line-height:1.5}
  .mock-cta{display:inline-block;margin-top:24px;padding:12px 24px;background:#00E87A;color:#0D0D0D;
    font-weight:700;border-radius:8px;font-size:16px}
  .footer{display:flex;justify-content:space-between;align-items:flex-end}
  .url-block .label{font-size:18px;opacity:0.55;letter-spacing:0.06em;margin-bottom:6px}
  .url-block .url-big{font-family:'DM Sans',sans-serif;font-weight:700;font-size:40px;color:#00E87A}
  .wordmark{font-family:'DM Sans',sans-serif;font-weight:700;color:#00E87A;font-size:38px;letter-spacing:0.04em}
</style></head>
<body>
  <div>
    <div class="eyebrow">PORTFOLIO</div>
    <div class="h1">実際の制作物を<br>ご覧ください。</div>
  </div>
  <div class="browser">
    <div class="browser-bar">
      <div class="dot r"></div><div class="dot y"></div><div class="dot g"></div>
      <div class="url">https://zeroen.dev</div>
    </div>
    <div class="browser-body">
      <div class="mock-tag">先着5名・受付中</div>
      <div class="mock-h">アイデアを、<br><span class="a">形にする。</span></div>
      <div class="mock-sub">個人事業主・小規模事業者向けに、初期費用ゼロでLPを制作します。</div>
      <div class="mock-cta">サービスを見る →</div>
    </div>
  </div>
  <div class="footer">
    <div class="url-block">
      <div class="label">PORTFOLIO</div>
      <div class="url-big">zeroen.dev</div>
    </div>
    <div class="wordmark">ZeroEn</div>
  </div>
</body></html>

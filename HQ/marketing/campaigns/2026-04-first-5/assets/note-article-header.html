<!DOCTYPE html>
<html lang="ja"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@700&family=Murecho:wght@500;700&display=block" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:#0D0D0D;width:1200px;height:630px;overflow:hidden;
    display:flex;align-items:center;justify-content:center;flex-direction:column;gap:24px}
  .logo-wrap{display:flex;align-items:center;gap:28px}
  .icon{width:80px;height:80px}
  .wordmark{font-family:'DM Sans',sans-serif;font-weight:700;color:#00E87A;font-size:80px;letter-spacing:0.04em;line-height:1}
  .tagline{font-family:'Murecho','Hiragino Sans',sans-serif;font-weight:500;font-size:22px;
    color:#F4F4F2;opacity:0.5;letter-spacing:0.08em}
</style></head>
<body>
  <div class="logo-wrap">
    <svg class="icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <circle cx="50" cy="50" r="42" fill="none" stroke="#F4F4F2" stroke-width="7" stroke-linecap="round" transform="rotate(2,50,50)"/>
      <line x1="14" y1="38" x2="86" y2="38" stroke="#00E87A" stroke-width="7" stroke-linecap="round"/>
      <line x1="14" y1="50" x2="86" y2="50" stroke="#00E87A" stroke-width="7" stroke-linecap="round"/>
      <line x1="14" y1="62" x2="86" y2="62" stroke="#00E87A" stroke-width="7" stroke-linecap="round"/>
    </svg>
    <div class="wordmark">ZeroEn</div>
  </div>
  <div class="tagline">個人事業主のためのLP制作・ホスティングサービス</div>
</body></html>

<!DOCTYPE html>
<html lang="ja"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Murecho:wght@500;700;800&family=DM+Sans:wght@700&display=block" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:#0D0D0D;width:1200px;height:900px;overflow:hidden;
    font-family:'Murecho','Hiragino Sans',sans-serif;color:#F4F4F2}
  body{display:flex;flex-direction:column;justify-content:space-between;padding:80px}
  .eyebrow{font-size:26px;color:#00E87A;font-weight:700;letter-spacing:0.08em;margin-bottom:16px}
  .h1{font-size:72px;font-weight:800;line-height:1.1}
  .timeline{display:flex;flex-direction:column;gap:36px}
  .row{display:flex;align-items:center;gap:28px}
  .dot{width:20px;height:20px;border-radius:50%;background:#00E87A;flex-shrink:0}
  .body{font-size:34px;font-weight:500;line-height:1.3}
  .body .role{font-weight:700}
  .body .place{color:#00E87A;font-weight:700}
  .body .desc{font-size:22px;opacity:0.7;margin-top:4px}
  .footer{display:flex;justify-content:space-between;align-items:flex-end}
  .name{font-size:30px;font-weight:700}
  .name span{opacity:0.5;font-weight:500;margin-left:12px;font-size:24px}
  .wordmark{font-family:'DM Sans',sans-serif;font-weight:700;color:#00E87A;font-size:38px;letter-spacing:0.04em}
</style></head>
<body>
  <div>
    <div class="eyebrow">CREDENTIALS</div>
    <div class="h1">経歴を、<br>正直に書きます。</div>
  </div>
  <div class="timeline">
    <div class="row"><div class="dot"></div>
      <div class="body">元 <span class="place">日立製作所</span> <span class="role">Webエンジニア</span>
        <div class="desc">社内システム・Webアプリケーション開発</div></div></div>
    <div class="row"><div class="dot"></div>
      <div class="body">元 <span class="place">楽天</span> <span class="role">Webエンジニア</span>
        <div class="desc">大規模Webサービスのフロント・バックエンド</div></div></div>
    <div class="row"><div class="dot"></div>
      <div class="body">現 <span class="place">ZeroEn</span> 創業者
        <div class="desc">個人事業主向けLP制作・運用</div></div></div>
  </div>
  <div class="footer">
    <div class="name">大都 <span>Daito</span></div>
    <div class="wordmark">ZeroEn</div>
  </div>
</body></html>

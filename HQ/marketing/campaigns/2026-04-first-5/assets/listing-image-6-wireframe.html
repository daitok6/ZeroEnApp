<!DOCTYPE html>
<html lang="ja"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Murecho:wght@500;700;800&family=DM+Sans:wght@700&display=block" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:#0D0D0D;width:1200px;height:900px;overflow:hidden;
    font-family:'Murecho','Hiragino Sans',sans-serif;color:#F4F4F2}
  body{display:flex;flex-direction:column;justify-content:space-between;padding:80px}
  .eyebrow{font-size:26px;color:#00E87A;font-weight:700;letter-spacing:0.08em;margin-bottom:16px}
  .h1{font-size:64px;font-weight:800;line-height:1.1}
  .stage{display:flex;gap:32px;align-items:flex-start;margin-top:8px}
  /* Phone-shaped wireframe representing the LP */
  .phone{flex:0 0 360px;height:560px;border:2px solid rgba(244,244,242,0.18);border-radius:24px;
    padding:18px;display:flex;flex-direction:column;gap:12px;background:#141414}
  .sec{border-radius:8px;padding:12px;display:flex;flex-direction:column;gap:8px;justify-content:center}
  .sec.hero{background:linear-gradient(180deg,rgba(0,232,122,0.18),rgba(0,232,122,0.04));
    border:1px solid rgba(0,232,122,0.4);height:200px}
  .sec.feat{background:rgba(244,244,242,0.04);border:1px solid rgba(244,244,242,0.1);height:140px}
  .sec.cta{background:rgba(0,232,122,0.1);border:1px solid rgba(0,232,122,0.5);height:100px}
  .skel{height:10px;border-radius:4px;background:rgba(244,244,242,0.25)}
  .skel.lg{height:18px;background:rgba(244,244,242,0.85)}
  .skel.md{height:13px;background:rgba(244,244,242,0.5)}
  .skel.btn{height:28px;background:#00E87A;width:55%;align-self:center}
  .feat-row{display:flex;gap:8px}
  .feat-col{flex:1;display:flex;flex-direction:column;gap:6px}
  .icon{height:18px;width:18px;border-radius:4px;background:rgba(0,232,122,0.6);align-self:center}
  /* Right side annotation list */
  .annot{flex:1;display:flex;flex-direction:column;gap:24px;margin-top:8px}
  .a-row{display:flex;gap:16px;align-items:flex-start}
  .a-num{font-family:'DM Sans',sans-serif;font-weight:700;color:#00E87A;font-size:32px;line-height:1;
    flex-shrink:0;width:48px}
  .a-body .a-title{font-size:26px;font-weight:700;line-height:1.2}
  .a-body .a-desc{font-size:18px;opacity:0.7;margin-top:6px;line-height:1.5}
  .footer{display:flex;justify-content:space-between;align-items:flex-end}
  .footnote{font-size:22px;opacity:0.65;line-height:1.5;max-width:680px}
  .wordmark{font-family:'DM Sans',sans-serif;font-weight:700;color:#00E87A;font-size:38px;letter-spacing:0.04em}
</style></head>
<body>
  <div>
    <div class="eyebrow">EXAMPLE — LP STRUCTURE</div>
    <div class="h1">こんなLPを<br>お作りします。</div>
  </div>
  <div class="stage">
    <div class="phone">
      <div class="sec hero">
        <div class="skel lg" style="width:80%"></div>
        <div class="skel lg" style="width:55%"></div>
        <div class="skel md" style="width:70%"></div>
        <div class="skel btn"></div>
      </div>
      <div class="sec feat">
        <div class="skel md" style="width:40%"></div>
        <div class="feat-row">
          <div class="feat-col"><div class="icon"></div><div class="skel" style="width:80%"></div><div class="skel" style="width:60%"></div></div>
          <div class="feat-col"><div class="icon"></div><div class="skel" style="width:80%"></div><div class="skel" style="width:60%"></div></div>
          <div class="feat-col"><div class="icon"></div><div class="skel" style="width:80%"></div><div class="skel" style="width:60%"></div></div>
        </div>
      </div>
      <div class="sec cta">
        <div class="skel md" style="width:65%;align-self:center"></div>
        <div class="skel btn"></div>
      </div>
    </div>
    <div class="annot">
      <div class="a-row"><div class="a-num">01</div>
        <div class="a-body"><div class="a-title">ヒーロー</div>
          <div class="a-desc">キャッチコピー＋サービス概要＋メインCTA。最初の3秒で惹きつけます。</div></div></div>
      <div class="a-row"><div class="a-num">02</div>
        <div class="a-body"><div class="a-title">特徴・ベネフィット</div>
          <div class="a-desc">3つの強みをカード形式で。アイコン＋見出し＋短い説明文。</div></div></div>
      <div class="a-row"><div class="a-num">03</div>
        <div class="a-body"><div class="a-title">CTA・お問い合わせ</div>
          <div class="a-desc">外部フォーム連携可。問い合わせ・予約・購入導線をシンプルに。</div></div></div>
    </div>
  </div>
  <div class="footer">
    <div class="footnote">構成はヒアリング時に最適化します。<br>※スコープが合わない場合は¥1,000を全額返金します。</div>
    <div class="wordmark">ZeroEn</div>
  </div>
</body></html>

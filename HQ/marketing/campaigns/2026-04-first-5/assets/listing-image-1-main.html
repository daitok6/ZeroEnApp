<!DOCTYPE html>
<html lang="ja"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Murecho:wght@500;700;800&family=DM+Sans:wght@700&display=block" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:#0D0D0D;width:1200px;height:900px;overflow:hidden;
    font-family:'Murecho','Hiragino Sans',sans-serif;color:#F4F4F2}
  body{display:flex;flex-direction:column;justify-content:space-between;padding:80px}
  .badge{display:inline-block;align-self:flex-start;padding:14px 28px;border:2px solid #00E87A;
    color:#00E87A;font-weight:700;font-size:26px;letter-spacing:0.08em;border-radius:999px}
  .middle{display:flex;flex-direction:column;gap:24px}
  .kicker{font-size:36px;font-weight:500;opacity:0.7;letter-spacing:0.04em}
  .h1{font-size:160px;font-weight:800;line-height:0.95;letter-spacing:0.02em}
  .h1 .accent{color:#00E87A}
  .price-row{display:flex;align-items:flex-end;justify-content:space-between;gap:48px}
  .price-block .label{font-size:22px;opacity:0.55;margin-bottom:4px}
  .price-block .value{font-size:64px;font-weight:700;line-height:1;opacity:0.85}
  .price-block .value .yen{opacity:0.7}
  .footer{display:flex;justify-content:space-between;align-items:flex-end}
  .credentials{font-size:24px;opacity:0.85;letter-spacing:0.04em}
  .credentials b{font-weight:700}
  .wordmark{font-family:'DM Sans',sans-serif;font-weight:700;color:#00E87A;font-size:38px;letter-spacing:0.04em}
</style></head>
<body>
  <div>
    <div class="badge">先着5名様限定</div>
  </div>
  <div class="middle">
    <div class="kicker">ZEROEN ／ LP制作のご相談</div>
    <div class="h1">LPを<br><span class="accent">無料</span>で。</div>
    <div class="price-row">
      <div class="price-block">
        <div class="label">相談料はビール1杯分のお礼だけ</div>
        <div class="value"><span class="yen">¥</span>500</div>
      </div>
    </div>
  </div>
  <div class="footer">
    <div class="credentials"><b>大都</b> ／ ex-Hitachi, ex-Rakuten</div>
    <div class="wordmark">ZeroEn</div>
  </div>
</body></html>

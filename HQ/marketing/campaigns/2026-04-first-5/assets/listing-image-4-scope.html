<!DOCTYPE html>
<html lang="ja"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Murecho:wght@500;700;800&family=DM+Sans:wght@700&display=block" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:#0D0D0D;width:1200px;height:900px;overflow:hidden;
    font-family:'Murecho','Hiragino Sans',sans-serif;color:#F4F4F2}
  body{display:flex;flex-direction:column;justify-content:space-between;padding:80px}
  .eyebrow{font-size:26px;color:#00E87A;font-weight:700;letter-spacing:0.08em;margin-bottom:16px}
  .h1{font-size:72px;font-weight:800;line-height:1.1}
  .grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px}
  .card{padding:28px 22px;border:1px solid rgba(244,244,242,0.15);border-radius:14px;min-height:240px;
    display:flex;flex-direction:column;justify-content:flex-start}
  .num{font-family:'DM Sans',sans-serif;font-weight:700;font-size:64px;color:#00E87A;line-height:1}
  .unit{font-size:20px;opacity:0.6;font-weight:500;margin-left:8px;color:#F4F4F2}
  .title{font-size:24px;font-weight:700;margin-top:14px}
  .desc{font-size:18px;opacity:0.7;margin-top:8px;line-height:1.5}
  .stack{padding:24px 28px;background:rgba(0,232,122,0.06);border-left:4px solid #00E87A;border-radius:8px}
  .stack-label{font-size:18px;color:#00E87A;font-weight:700;letter-spacing:0.06em;margin-bottom:6px}
  .stack-body{font-size:24px;font-weight:500}
  .footer{display:flex;justify-content:space-between;align-items:flex-end}
  .footnote{font-size:20px;opacity:0.6;line-height:1.5;max-width:760px}
  .wordmark{font-family:'DM Sans',sans-serif;font-weight:700;color:#00E87A;font-size:38px;letter-spacing:0.04em}
</style></head>
<body>
  <div>
    <div class="eyebrow">SCOPE — LOCKED AT KICKOFF</div>
    <div class="h1">スコープを<br>はっきり書きます。</div>
  </div>
  <div class="grid">
    <div class="card">
      <div class="num">1<span class="unit">ページ</span></div>
      <div class="title">ランディングページ</div>
      <div class="desc">構成1枚に集約。トップ・特徴・CTA など。</div>
    </div>
    <div class="card">
      <div class="num">3<span class="unit">セクション</span></div>
      <div class="title">セクション数</div>
      <div class="desc">ヒーロー＋特徴＋お問い合わせ等で3つまで。</div>
    </div>
    <div class="card">
      <div class="num">1-3<span class="unit">日</span></div>
      <div class="title">納品スピード</div>
      <div class="desc">ヒアリング後、初稿まで最短1営業日。</div>
    </div>
  </div>
  <div class="stack">
    <div class="stack-label">TECH STACK</div>
    <div class="stack-body">Next.js · React · TypeScript · Tailwind CSS · Vercel</div>
  </div>
  <div class="footer">
    <div class="footnote">EC・会員機能・問い合わせフォーム高度化など追加要件は別途見積もりとなります。</div>
    <div class="wordmark">ZeroEn</div>
  </div>
</body></html>

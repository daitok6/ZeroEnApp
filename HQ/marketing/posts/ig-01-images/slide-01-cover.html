<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=IBM+Plex+Mono:wght@400;600&family=Murecho:wght@500;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1080px;
    background: #0D0D0D;
    font-family: 'IBM Plex Mono', monospace;
    color: #F4F4F2;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    overflow: hidden; position: relative;
  }
  .top-bar {
    position: absolute; top: 0; left: 0; right: 0;
    height: 5px; background: #00E87A;
  }
  .inner {
    width: 920px;
    display: flex; flex-direction: column;
    align-items: flex-start;
  }
  .eyebrow {
    font-size: 12px; letter-spacing: 0.2em; color: #00E87A;
    text-transform: uppercase; margin-bottom: 32px;
  }
  .title-main {
    font-family: 'Murecho', sans-serif; font-weight: 700;
    font-size: 72px; line-height: 1.1; color: #F4F4F2;
    letter-spacing: -2px; margin-bottom: 8px;
  }
  .title-accent {
    font-family: 'Syne', sans-serif; font-weight: 800;
    font-size: 96px; line-height: 1.0; color: #00E87A;
    letter-spacing: -3px; margin-bottom: 40px;
  }
  .divider {
    width: 100%; height: 1px; background: #222;
    margin-bottom: 36px;
  }
  .subtitle {
    font-family: 'Murecho', sans-serif; font-weight: 500;
    font-size: 18px; line-height: 1.8; color: #AAA;
  }
  .handle {
    position: absolute; bottom: 48px; right: 80px;
    font-size: 12px; color: #444; letter-spacing: 0.05em;
  }
  .slide-num {
    position: absolute; bottom: 48px; left: 80px;
    font-size: 11px; color: #333; letter-spacing: 0.15em;
  }
</style>
</head>
<body>
<div class="top-bar"></div>
<div class="inner">
  <div class="eyebrow">集客できないLPの共通点</div>
  <div class="title-main">コーチのLPが<br>集客できない</div>
  <div class="title-accent">3つの理由</div>
  <div class="divider"></div>
  <div class="subtitle">
    問い合わせが来ないのは、<br>
    あなたのせいじゃない。
  </div>
</div>
<div class="slide-num">01 / 06</div>
<div class="handle">@zeroen.dev</div>
</body>
</html>

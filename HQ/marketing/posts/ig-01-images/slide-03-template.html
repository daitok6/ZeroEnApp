<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=IBM+Plex+Mono:wght@400;600&family=Murecho:wght@500;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1080px;
    background: #0D0D0D;
    font-family: 'IBM Plex Mono', monospace;
    color: #F4F4F2;
    display: flex; flex-direction: column;
    align-items: flex-start; justify-content: center;
    padding: 0 80px;
    overflow: hidden; position: relative;
  }
  .top-bar {
    position: absolute; top: 0; left: 0; right: 0;
    height: 5px; background: #00E87A;
  }
  .label {
    font-size: 11px; letter-spacing: 0.22em; color: #00E87A;
    text-transform: uppercase; margin-bottom: 24px;
  }
  .heading {
    font-family: 'Murecho', sans-serif; font-weight: 700;
    font-size: 68px; line-height: 1.15; color: #F4F4F2;
    margin-bottom: 40px;
  }
  .heading .strike {
    text-decoration: line-through; text-decoration-color: #00E87A;
    text-decoration-thickness: 3px; color: #555;
  }
  .divider {
    width: 48px; height: 3px; background: #00E87A;
    margin-bottom: 40px;
  }
  .body {
    font-family: 'Murecho', sans-serif; font-weight: 500;
    font-size: 20px; line-height: 2.0; color: #AAA;
    max-width: 820px;
  }
  .body strong { color: #F4F4F2; font-weight: 700; }
  .body .em { color: #00E87A; }
  .tools {
    display: inline-flex; gap: 8px; flex-wrap: wrap;
    margin-bottom: 4px;
  }
  .tool-tag {
    background: #1A1A1A; border: 1px solid #333;
    border-radius: 4px; padding: 2px 10px;
    font-size: 14px; color: #888;
    font-family: 'IBM Plex Mono', monospace;
  }
  .handle {
    position: absolute; bottom: 48px; right: 80px;
    font-size: 12px; color: #444;
  }
  .slide-num {
    position: absolute; bottom: 48px; left: 80px;
    font-size: 11px; color: #333; letter-spacing: 0.15em;
  }
</style>
</head>
<body>
<div class="top-bar"></div>
<div class="label">理由 02 / 03</div>
<div class="heading">みんなと<span class="strike">同じ</span><br>ページに見える</div>
<div class="divider"></div>
<div class="body">
  <div class="tools">
    <span class="tool-tag">ペライチ</span>
    <span class="tool-tag">STUDIO</span>
    <span class="tool-tag">Canva</span>
  </div>
  で作ったLP——<br>
  同じツールを使えば、<strong>同じような見た目</strong>になります。<br><br>
  カラーを変えても、写真を入れ替えても、<br>
  「また同じようなページ」と思われた瞬間、<br>
  <span class="em">読むのをやめられます。</span><br><br>
  競合と並んで選ばれるには、<br>
  <strong>「この人だ」と感じさせるページ</strong>が、必要です。
</div>
<div class="slide-num">03 / 06</div>
<div class="handle">@zeroen.dev</div>
</body>
</html>

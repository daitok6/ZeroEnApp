<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=IBM+Plex+Mono:wght@400;600&family=Murecho:wght@500;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1080px;
    background: #0D0D0D;
    font-family: 'IBM Plex Mono', monospace;
    color: #F4F4F2;
    display: flex; flex-direction: column;
    align-items: flex-start; justify-content: center;
    padding: 0 80px;
    overflow: hidden; position: relative;
  }
  .top-bar {
    position: absolute; top: 0; left: 0; right: 0;
    height: 5px; background: #00E87A;
  }
  .label {
    font-size: 11px; letter-spacing: 0.22em; color: #00E87A;
    text-transform: uppercase; margin-bottom: 24px;
  }
  .heading {
    font-family: 'Murecho', sans-serif; font-weight: 700;
    font-size: 68px; line-height: 1.15; color: #F4F4F2;
    margin-bottom: 40px;
  }
  .divider {
    width: 48px; height: 3px; background: #00E87A;
    margin-bottom: 40px;
  }
  .body {
    font-family: 'Murecho', sans-serif; font-weight: 500;
    font-size: 20px; line-height: 1.8; color: #AAA;
    max-width: 820px;
  }
  .body strong { color: #F4F4F2; font-weight: 700; }
  .body .em { color: #00E87A; }
  .stat-box {
    display: inline-block;
    background: #00E87A22; border: 1px solid #00E87A66;
    border-radius: 6px; padding: 4px 14px;
    font-family: 'Syne', sans-serif; font-weight: 800;
    font-size: 20px; color: #00E87A;
    margin: 0 4px;
  }
  .handle {
    position: absolute; bottom: 48px; right: 80px;
    font-size: 12px; color: #444;
  }
  .slide-num {
    position: absolute; bottom: 48px; left: 80px;
    font-size: 11px; color: #333; letter-spacing: 0.15em;
  }
</style>
</head>
<body>
<div class="top-bar"></div>
<div class="label">理由 01 / 03</div>
<div class="heading">スマホで<br>崩れている</div>
<div class="divider"></div>
<div class="body">
  コーチ・セラピストへのアクセスの<br>
  <span class="stat-box">8割以上</span>はスマートフォンから。<br><br>
  Instagramのリンクをタップしたその瞬間——<br>
  <strong>テキストが重なっている。</strong><br>
  <strong>ボタンが画面からはみ出している。</strong><br><br>
  それだけで、離脱されています。<br>
  「PC版は綺麗なのに」——<span class="em">その言い訳、訪問者には聞こえていません。</span>
</div>
<div class="slide-num">02 / 06</div>
<div class="handle">@zeroen.dev</div>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=IBM+Plex+Mono:wght@400;600&family=Murecho:wght@500;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1080px;
    background: #0D0D0D;
    font-family: 'IBM Plex Mono', monospace;
    color: #F4F4F2;
    display: flex; flex-direction: column;
    align-items: flex-start; justify-content: center;
    padding: 0 80px;
    overflow: hidden; position: relative;
  }
  .top-bar {
    position: absolute; top: 0; left: 0; right: 0;
    height: 5px; background: #00E87A;
  }
  .brand {
    font-family: 'Syne', sans-serif; font-weight: 800;
    font-size: 14px; letter-spacing: 0.2em; color: #00E87A;
    text-transform: uppercase; margin-bottom: 32px;
  }
  .offer {
    font-family: 'Murecho', sans-serif; font-weight: 700;
    font-size: 36px; line-height: 1.5; color: #F4F4F2;
    margin-bottom: 36px; max-width: 820px;
  }
  .offer .price {
    font-family: 'Syne', sans-serif; font-weight: 800;
    font-size: 48px; color: #00E87A; letter-spacing: -1px;
  }
  .pills {
    display: flex; gap: 16px; margin-bottom: 32px; flex-wrap: wrap;
  }
  .pill {
    background: #111; border: 1px solid #222;
    border-radius: 100px; padding: 10px 24px;
    font-family: 'Murecho', sans-serif; font-size: 17px; color: #888;
  }
  .pill span { color: #F4F4F2; font-weight: 700; }
  .divider {
    width: 100%; height: 1px; background: #1A1A1A;
    margin-bottom: 28px;
  }
  .cta-text {
    font-family: 'Murecho', sans-serif; font-weight: 500;
    font-size: 20px; line-height: 1.9; color: #888;
    max-width: 820px;
  }
  .cta-text strong { color: #F4F4F2; font-weight: 700; }
  .handle {
    position: absolute; bottom: 48px; right: 80px;
    font-size: 14px; color: #555; font-family: 'IBM Plex Mono', monospace;
    letter-spacing: 0.05em;
  }
  .slide-num {
    position: absolute; bottom: 48px; left: 80px;
    font-size: 11px; color: #333; letter-spacing: 0.15em;
  }
</style>
</head>
<body>
<div class="top-bar"></div>
<div class="brand">ZeroEn</div>
<div class="offer">
  コーチ・セラピストのLPを<br>
  <span class="price">無料</span>で作り、<br>
  月<span class="price">¥5,000</span>で運用します。
</div>
<div class="pills">
  <div class="pill">制作費 <span>¥0</span></div>
  <div class="pill">素材提供後 <span>約5〜7営業日</span>で公開</div>
</div>
<div class="divider"></div>
<div class="cta-text">
  まず、詳細を読んでみてください。<br>
  <strong>申し込みは、納得してからで大丈夫です。</strong><br><br>
  プロフィールのリンクから。
</div>
<div class="slide-num">06 / 06</div>
<div class="handle">@zeroen.dev</div>
</body>
</html>

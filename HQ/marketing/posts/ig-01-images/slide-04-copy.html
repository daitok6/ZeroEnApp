<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=IBM+Plex+Mono:wght@400;600&family=Murecho:wght@500;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1080px;
    background: #0D0D0D;
    font-family: 'IBM Plex Mono', monospace;
    color: #F4F4F2;
    display: flex; flex-direction: column;
    align-items: flex-start; justify-content: center;
    padding: 0 80px;
    overflow: hidden; position: relative;
  }
  .top-bar {
    position: absolute; top: 0; left: 0; right: 0;
    height: 5px; background: #00E87A;
  }
  .label {
    font-size: 11px; letter-spacing: 0.22em; color: #00E87A;
    text-transform: uppercase; margin-bottom: 24px;
  }
  .heading {
    font-family: 'Murecho', sans-serif; font-weight: 700;
    font-size: 68px; line-height: 1.15; color: #F4F4F2;
    margin-bottom: 40px;
  }
  .divider {
    width: 48px; height: 3px; background: #00E87A;
    margin-bottom: 36px;
  }
  .quotes {
    display: flex; flex-direction: column; gap: 8px;
    margin-bottom: 28px;
  }
  .quote {
    font-family: 'Murecho', sans-serif; font-weight: 500;
    font-size: 18px; color: #555;
    padding-left: 16px;
    border-left: 2px solid #333;
  }
  .honest {
    font-family: 'Murecho', sans-serif; font-weight: 500;
    font-size: 18px; color: #888; margin-bottom: 28px;
  }
  .honest span { color: #F4F4F2; font-weight: 700; }
  .insight {
    font-family: 'Murecho', sans-serif; font-weight: 500;
    font-size: 20px; line-height: 1.9; color: #AAA;
    max-width: 820px;
  }
  .insight .em { color: #00E87A; }
  .insight strong { color: #F4F4F2; font-weight: 700; }
  .sec-highlight {
    font-family: 'Syne', sans-serif; font-weight: 800;
    font-size: 20px; color: #00E87A;
    margin-top: 24px; letter-spacing: -0.5px;
  }
  .handle {
    position: absolute; bottom: 48px; right: 80px;
    font-size: 12px; color: #444;
  }
  .slide-num {
    position: absolute; bottom: 48px; left: 80px;
    font-size: 11px; color: #333; letter-spacing: 0.15em;
  }
</style>
</head>
<body>
<div class="top-bar"></div>
<div class="label">理由 03 / 03</div>
<div class="heading">コピーが<br>刺さっていない</div>
<div class="divider"></div>
<div class="quotes">
  <div class="quote">「丁寧なサポート」</div>
  <div class="quote">「あなたに寄り添います」</div>
  <div class="quote">「一緒に歩んでいきます」</div>
</div>
<div class="honest">……正直に言います。<span>これは読まれていません。</span></div>
<div class="insight">
  訪問者がLPを見て判断するのは、ページを開いた<span class="em">最初の3秒。</span><br>
  「これは自分のことを言っている」<br>
  そう感じられる言葉だけが、続きを読ませます。
</div>
<div class="sec-highlight">刺さるコピーは、技術です。それを、代わりに書きます。</div>
<div class="slide-num">04 / 06</div>
<div class="handle">@zeroen.dev</div>
</body>
</html>

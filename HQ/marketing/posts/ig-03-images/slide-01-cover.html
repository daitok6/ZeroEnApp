<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=IBM+Plex+Mono:wght@400;600&family=Murecho:wght@500;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1080px;
    background: #0D0D0D;
    font-family: 'IBM Plex Mono', monospace;
    color: #F4F4F2;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    overflow: hidden; position: relative;
  }
  .top-bar {
    position: absolute; top: 0; left: 0; right: 0;
    height: 5px; background: #00E87A;
  }
  .inner {
    width: 920px;
    display: flex; flex-direction: column;
    align-items: center; text-align: center;
  }
  .eyebrow {
    font-family: 'IBM Plex Mono', monospace; font-weight: 600;
    font-size: 13px; letter-spacing: 0.3em; color: #00E87A;
    text-transform: uppercase; margin-bottom: 56px;
  }
  .title {
    font-family: 'Murecho', sans-serif; font-weight: 700;
    font-size: 96px; line-height: 1.15; color: #F4F4F2;
    letter-spacing: -3px; margin-bottom: 72px;
  }
  .divider {
    width: 280px; height: 1px; background: #222;
    margin-bottom: 48px;
  }
  .subtitle {
    font-family: 'Murecho', sans-serif; font-weight: 500;
    font-size: 22px; line-height: 1.9; color: #888;
    letter-spacing: 0.02em;
  }
  .handle {
    position: absolute; bottom: 48px; right: 80px;
    font-size: 12px; color: #444; letter-spacing: 0.05em;
  }
  .slide-num {
    position: absolute; bottom: 48px; left: 80px;
    font-size: 11px; color: #333; letter-spacing: 0.15em;
  }
</style>
</head>
<body>
<div class="top-bar"></div>
<div class="inner">
  <div class="eyebrow">2026.04 — LAUNCHED</div>
  <div class="title">ZeroEn、<br>始動しました。</div>
  <div class="divider"></div>
  <div class="subtitle">
    ゼロ円で作って、月¥5,000で運用する。<br>
    そういうLP契約を、始めます。
  </div>
</div>
<div class="slide-num">01 / 06</div>
<div class="handle">@zeroen.dev</div>
</body>
</html>

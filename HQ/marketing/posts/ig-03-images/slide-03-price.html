<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=IBM+Plex+Mono:wght@400;600&family=Murecho:wght@500;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1080px;
    background: #0D0D0D;
    font-family: 'IBM Plex Mono', monospace;
    color: #F4F4F2;
    display: flex; flex-direction: column;
    align-items: flex-start; justify-content: center;
    padding: 0 80px;
    overflow: hidden; position: relative;
  }
  .top-bar {
    position: absolute; top: 0; left: 0; right: 0;
    height: 5px; background: #00E87A;
  }
  .inner {
    width: 920px;
    display: flex; flex-direction: column;
    align-items: flex-start;
  }
  .head {
    font-family: 'Murecho', sans-serif; font-weight: 700;
    font-size: 52px; line-height: 1.2; color: #F4F4F2;
    letter-spacing: -1.5px; margin-bottom: 44px;
  }
  .head .price {
    font-family: 'Syne', sans-serif; font-weight: 800;
    font-size: 72px; color: #00E87A; letter-spacing: -2px;
  }
  .divider {
    width: 100%; height: 1px; background: #1A1A1A;
    margin-bottom: 36px;
  }
  .table {
    width: 100%;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 22px;
    margin-bottom: 36px;
  }
  .row {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 14px 0;
    border-bottom: 1px solid #141414;
  }
  .row:last-child { border-bottom: none; }
  .label {
    font-family: 'Murecho', sans-serif; font-weight: 500;
    color: #888; font-size: 21px;
  }
  .value {
    font-family: 'IBM Plex Mono', monospace; font-weight: 600;
    color: #F4F4F2; font-size: 22px;
  }
  .footer {
    font-family: 'Murecho', sans-serif; font-weight: 500;
    font-size: 18px; line-height: 1.8; color: #666;
  }
  .slide-num {
    position: absolute; bottom: 48px; left: 80px;
    font-size: 11px; color: #333; letter-spacing: 0.15em;
  }
</style>
</head>
<body>
<div class="top-bar"></div>
<div class="inner">
  <div class="head">月 <span class="price">¥5,000</span> で、</div>
  <div class="divider"></div>
  <div class="table">
    <div class="row"><div class="label">制作費</div><div class="value">¥0</div></div>
    <div class="row"><div class="label">ホスティング</div><div class="value">Vercel</div></div>
    <div class="row"><div class="label">スマホ最適化</div><div class="value">含む</div></div>
    <div class="row"><div class="label">月1回の小規模修正</div><div class="value">含む</div></div>
    <div class="row"><div class="label">月次レポート</div><div class="value">PDF で納品</div></div>
  </div>
  <div class="divider"></div>
  <div class="footer">
    素材が揃えば、<br>
    3営業日で公開します。
  </div>
</div>
<div class="slide-num">03 / 06</div>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=IBM+Plex+Mono:wght@400;600&family=Murecho:wght@500;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1080px;
    background: #0D0D0D;
    font-family: 'IBM Plex Mono', monospace;
    color: #F4F4F2;
    display: flex; flex-direction: column;
    align-items: flex-start; justify-content: center;
    padding: 0 80px;
    overflow: hidden; position: relative;
  }
  .top-bar {
    position: absolute; top: 0; left: 0; right: 0;
    height: 5px; background: #00E87A;
  }
  .inner {
    width: 920px;
    display: flex; flex-direction: column;
    align-items: flex-start;
  }
  .heading {
    font-family: 'Murecho', sans-serif; font-weight: 700;
    font-size: 40px; line-height: 1.4; color: #F4F4F2;
    letter-spacing: -1px; margin-bottom: 36px;
  }
  .divider {
    width: 100%; height: 1px; background: #1A1A1A;
    margin-bottom: 32px;
  }
  .para {
    font-family: 'Murecho', sans-serif; font-weight: 500;
    font-size: 22px; line-height: 1.85; color: #BBB;
    margin-bottom: 28px;
  }
  .symptoms {
    font-family: 'Murecho', sans-serif; font-weight: 400;
    font-size: 20px; line-height: 2.1; color: #777;
    margin-bottom: 32px;
  }
  .emphasis {
    font-family: 'Murecho', sans-serif; font-weight: 700;
    font-size: 26px; line-height: 1.7; color: #F4F4F2;
    margin-bottom: 32px;
  }
  .closer {
    font-family: 'Murecho', sans-serif; font-weight: 500;
    font-size: 17px; line-height: 1.8; color: #666;
  }
  .slide-num {
    position: absolute; bottom: 48px; left: 80px;
    font-size: 11px; color: #333; letter-spacing: 0.15em;
  }
</style>
</head>
<body>
<div class="top-bar"></div>
<div class="inner">
  <div class="heading">なぜ、この契約の形にしたのか。</div>
  <div class="divider"></div>
  <div class="para">
    制作費を一括で払った瞬間、<br>
    関係が終わるモデルを、何度も見てきました。
  </div>
  <div class="symptoms">
    公開した後に崩れる。<br>
    問い合わせが来ない。<br>
    直したくても、また費用がかかる。
  </div>
  <div class="divider"></div>
  <div class="emphasis">
    それなら、作る側も<br>
    運用に残ればいい。
  </div>
  <div class="closer">
    月額にして、続く責任を引き受ける側に回る。<br>
    ZeroEnは、その設計です。
  </div>
</div>
<div class="slide-num">02 / 06</div>
</body>
</html>

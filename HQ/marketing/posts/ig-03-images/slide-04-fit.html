<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=IBM+Plex+Mono:wght@400;600&family=Murecho:wght@500;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1080px;
    background: #0D0D0D;
    font-family: 'IBM Plex Mono', monospace;
    color: #F4F4F2;
    display: flex; flex-direction: column;
    align-items: flex-start; justify-content: center;
    padding: 0 80px;
    overflow: hidden; position: relative;
  }
  .top-bar {
    position: absolute; top: 0; left: 0; right: 0;
    height: 5px; background: #00E87A;
  }
  .inner {
    width: 920px;
    display: flex; flex-direction: column;
    align-items: flex-start;
  }
  .accent-line {
    width: 32px; height: 4px; background: #00E87A;
    margin-bottom: 28px;
  }
  .heading {
    font-family: 'Murecho', sans-serif; font-weight: 700;
    font-size: 42px; line-height: 1.3; color: #F4F4F2;
    letter-spacing: -1px; margin-bottom: 36px;
  }
  .divider {
    width: 100%; height: 1px; background: #1A1A1A;
    margin-bottom: 32px;
  }
  .list {
    font-family: 'Murecho', sans-serif; font-weight: 500;
    font-size: 22px; line-height: 1.9; color: #E8E8E8;
    margin-bottom: 32px;
  }
  .item {
    margin-bottom: 20px;
    padding-left: 24px;
    position: relative;
  }
  .item::before {
    content: "・"; position: absolute; left: 0; color: #F4F4F2;
  }
  .item:last-child { margin-bottom: 0; }
  .negative {
    font-family: 'Murecho', sans-serif; font-weight: 500;
    font-size: 18px; line-height: 1.9; color: #666;
  }
  .slide-num {
    position: absolute; bottom: 48px; left: 80px;
    font-size: 11px; color: #333; letter-spacing: 0.15em;
  }
</style>
</head>
<body>
<div class="top-bar"></div>
<div class="inner">
  <div class="accent-line"></div>
  <div class="heading">こんな方に向いています。</div>
  <div class="divider"></div>
  <div class="list">
    <div class="item">すでにサービスはあるが、<br>　LPだけが追いついていない方</div>
    <div class="item">制作費を一括で払うのが<br>　難しい方</div>
    <div class="item">公開して終わりではなく、<br>　運用まで任せたい方</div>
  </div>
  <div class="divider"></div>
  <div class="negative">
    逆に、コードを自分で所有したい方、<br>
    短期で解約する前提の方には、向いていません。
  </div>
</div>
<div class="slide-num">04 / 06</div>
</body>
</html>

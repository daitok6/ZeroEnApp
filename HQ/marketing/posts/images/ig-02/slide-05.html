<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=IBM+Plex+Mono:wght@400;600&family=Murecho:wght@500;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1080px;
    background: #0D0D0D;
    font-family: 'IBM Plex Mono', monospace;
    color: #F4F4F2;
    overflow: hidden;
    position: relative;
  }
  .content {
    position: absolute;
    top: 80px; left: 80px; right: 80px; bottom: 80px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .label {
    font-family: 'Murecho', sans-serif;
    font-size: 14px;
    color: #666;
    margin-bottom: 32px;
  }
  .divider {
    width: 100%;
    height: 1px;
    background: #222;
    margin-bottom: 32px;
  }
  .condition-block {
    margin-bottom: 24px;
  }
  .condition-text {
    font-family: 'Murecho', sans-serif;
    font-weight: 500;
    font-size: 17px;
    color: #E0E0E0;
    line-height: 1.6;
  }
  .condition-text-small {
    font-family: 'Murecho', sans-serif;
    font-weight: 500;
    font-size: 16px;
    color: #E0E0E0;
    line-height: 1.6;
  }
  .divider2 {
    width: 100%;
    height: 1px;
    background: #222;
    margin-bottom: 24px;
    margin-top: 36px;
  }
  .footer {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: #555;
    line-height: 1.8;
  }
</style>
</head>
<body>
  <div class="content">
    <div class="label">正直に言っておくことがあります。</div>
    <div class="divider"></div>
    <div class="condition-block">
      <div class="condition-text">コードの所有権は、ZeroEnにあります。</div>
    </div>
    <div class="condition-block">
      <div class="condition-text">サービスを解約すると、<br>サイトはアーカイブされます。</div>
    </div>
    <div class="condition-block">
      <div class="condition-text-small">最低6ヶ月の継続が前提です。<br>途中解約の場合、残り月数分のお支払いが発生します。</div>
    </div>
    <div class="condition-block">
      <div class="condition-text-small">変更の範囲は、契約時に決めた範囲内に限ります。</div>
    </div>
    <div class="divider2"></div>
    <div class="footer">これらは、全員に同じ条件で適用されます。<br>事前に合わない方は、ご応募をお控えください。</div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=IBM+Plex+Mono:wght@400;600&family=Murecho:wght@500;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1080px;
    background: #0D0D0D;
    font-family: 'IBM Plex Mono', monospace;
    color: #F4F4F2;
    overflow: hidden;
    position: relative;
  }
  .content {
    position: absolute;
    top: 80px; left: 80px; right: 80px; bottom: 80px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .section-a-heading {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 22px;
    color: #00E87A;
    border-left: 4px solid #00E87A;
    padding-left: 12px;
    margin-bottom: 20px;
  }
  .bullet-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 40px;
    padding-left: 4px;
  }
  .bullet-item {
    font-family: 'Murecho', sans-serif;
    font-size: 15px;
    color: #E0E0E0;
    line-height: 1.8;
  }
  .divider {
    width: 100%;
    height: 1px;
    background: #1E1E1E;
    margin-bottom: 32px;
  }
  .section-b-heading {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 500;
    font-size: 16px;
    color: #555;
    margin-bottom: 16px;
  }
  .not-for-list {
    display: flex;
    flex-direction: column;
    gap: 0;
  }
  .not-for-item {
    font-family: 'Murecho', sans-serif;
    font-size: 14px;
    color: #555;
    line-height: 1.7;
  }
</style>
</head>
<body>
  <div class="content">
    <div class="section-a-heading">こんな方に向いています</div>
    <div class="bullet-list">
      <div class="bullet-item">Instagramで集客しているが問い合わせが来ていない</div>
      <div class="bullet-item">すでにサービスがあって、LPだけが足りていない</div>
      <div class="bullet-item">月¥5,000なら続けられるが、初期費用は厳しい</div>
    </div>
    <div class="divider"></div>
    <div class="section-b-heading">向いていない方</div>
    <div class="not-for-list">
      <div class="not-for-item">コードの所有権が気になる方</div>
      <div class="not-for-item">6ヶ月で必ず解約したい方</div>
      <div class="not-for-item">自由にサイトを編集したい方</div>
    </div>
  </div>
</body>
</html>

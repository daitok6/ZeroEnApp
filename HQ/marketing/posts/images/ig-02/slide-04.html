<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=IBM+Plex+Mono:wght@400;600&family=Murecho:wght@500;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1080px;
    background: #0D0D0D;
    font-family: 'IBM Plex Mono', monospace;
    color: #F4F4F2;
    overflow: hidden;
    position: relative;
  }
  .content {
    position: absolute;
    top: 80px; left: 80px; right: 80px; bottom: 80px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .heading {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 38px;
    color: #F4F4F2;
    margin-bottom: 16px;
  }
  .divider {
    width: 100%;
    height: 1px;
    background: #222;
    margin-bottom: 36px;
  }
  .checklist {
    display: flex;
    flex-direction: column;
    gap: 16px;
    margin-bottom: 36px;
  }
  .check-row {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .check-mark {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600;
    font-size: 16px;
    color: #00E87A;
    flex-shrink: 0;
  }
  .check-text {
    font-family: 'Murecho', sans-serif;
    font-weight: 500;
    font-size: 16px;
    color: #F4F4F2;
  }
  .divider2 {
    width: 100%;
    height: 1px;
    background: #222;
    margin-bottom: 28px;
  }
  .highlight-box {
    background: #111;
    border: 1px solid #222;
    border-radius: 6px;
    padding: 20px 24px;
    margin-bottom: 16px;
  }
  .highlight-line1 {
    font-family: 'Murecho', sans-serif;
    font-size: 14px;
    color: #888;
    margin-bottom: 6px;
  }
  .highlight-line2 {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 28px;
    color: #00E87A;
  }
  .footer {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: #555;
  }
</style>
</head>
<body>
  <div class="content">
    <div class="heading">月¥5,000に含まれるもの</div>
    <div class="divider"></div>
    <div class="checklist">
      <div class="check-row">
        <span class="check-mark">✓</span>
        <span class="check-text">LP制作（無料）</span>
      </div>
      <div class="check-row">
        <span class="check-mark">✓</span>
        <span class="check-text">Vercelホスティング</span>
      </div>
      <div class="check-row">
        <span class="check-mark">✓</span>
        <span class="check-text">スマホ最適化</span>
      </div>
      <div class="check-row">
        <span class="check-mark">✓</span>
        <span class="check-text">月1回の小規模修正</span>
      </div>
      <div class="check-row">
        <span class="check-mark">✓</span>
        <span class="check-text">毎月のアクセスレポート（PDF）</span>
      </div>
    </div>
    <div class="divider2"></div>
    <div class="highlight-box">
      <div class="highlight-line1">素材を渡せば、</div>
      <div class="highlight-line2">3営業日で公開します。</div>
    </div>
    <div class="footer">更新も、レポートも、すべて込みです。</div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=IBM+Plex+Mono:wght@400;600&family=Murecho:wght@500;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1080px;
    background: #0D0D0D;
    font-family: 'IBM Plex Mono', monospace;
    color: #F4F4F2;
    overflow: hidden;
    position: relative;
  }
  .content {
    position: absolute;
    top: 80px; left: 80px; right: 80px; bottom: 80px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .heading {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 40px;
    color: #F4F4F2;
    margin-bottom: 40px;
  }
  .divider {
    width: 100%;
    height: 1px;
    background: #222;
    margin-bottom: 40px;
  }
  .price-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 28px;
  }
  .price-label {
    font-family: 'Murecho', sans-serif;
    font-size: 14px;
    color: #888;
  }
  .price-free {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600;
    font-size: 48px;
    color: #00E87A;
  }
  .price-monthly {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600;
    font-size: 24px;
    color: #00E87A;
  }
  .divider2 {
    width: 100%;
    height: 1px;
    background: #222;
    margin-bottom: 40px;
    margin-top: 0;
  }
  .statement-line {
    font-family: 'Murecho', sans-serif;
    font-weight: 500;
    font-size: 18px;
    color: #F4F4F2;
    line-height: 2.0;
  }
  .prefix {
    color: #00E87A;
    margin-right: 10px;
  }
  .footer-note {
    margin-top: 28px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    color: #555;
  }
</style>
</head>
<body>
  <div class="content">
    <div class="heading">ZeroEnは、逆の設計です。</div>
    <div class="divider"></div>
    <div class="price-row">
      <span class="price-label">制作費</span>
      <span class="price-free">¥0</span>
    </div>
    <div class="price-row">
      <span class="price-label">月額サブスクリプション</span>
      <span class="price-monthly">¥5,000 / mo</span>
    </div>
    <div style="height: 48px;"></div>
    <div class="divider2"></div>
    <div class="statement-line"><span class="prefix">—</span>ZeroEnが作る。</div>
    <div class="statement-line"><span class="prefix">—</span>ZeroEnが運用する。</div>
    <div class="statement-line"><span class="prefix">—</span>ZeroEnが成果にコミットし続ける。</div>
    <div class="footer-note">だから、月額制が成立します。</div>
  </div>
</body>
</html>

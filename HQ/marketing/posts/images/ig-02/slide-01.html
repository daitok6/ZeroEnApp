<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=IBM+Plex+Mono:wght@400;600&family=Murecho:wght@500;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1080px;
    background: #0D0D0D;
    font-family: 'IBM Plex Mono', monospace;
    color: #F4F4F2;
    overflow: hidden;
    position: relative;
  }
  .content {
    position: absolute;
    top: 80px; left: 80px; right: 80px; bottom: 80px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .rule {
    width: 100%;
    height: 4px;
    background: #00E87A;
  }
  .eyebrow {
    margin-top: 40px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #00E87A;
  }
  .title-grey {
    margin-top: 24px;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 42px;
    color: #888;
    line-height: 1.1;
  }
  .title-main {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 68px;
    color: #F4F4F2;
    line-height: 1.1;
  }
  .subtitle {
    margin-top: 32px;
    font-family: 'Murecho', sans-serif;
    font-weight: 500;
    font-size: 16px;
    color: #888;
  }
  .rule-bottom {
    margin-top: 40px;
    width: 100%;
    height: 4px;
    background: #00E87A;
  }
  .handle {
    position: absolute;
    bottom: 40px; right: 48px;
    font-size: 11px; color: #444;
    font-family: 'IBM Plex Mono', monospace;
  }
</style>
</head>
<body>
  <div class="content">
    <div class="rule"></div>
    <div class="eyebrow">LP 制作サービス</div>
    <div class="title-grey">制作費0円のLP——</div>
    <div class="title-main">なぜそれが<br>成立するのか</div>
    <div class="subtitle">ZeroEnの仕組みを、正直に説明します。</div>
    <div class="rule-bottom"></div>
  </div>
  <div class="handle">zeroen.dev</div>
</body>
</html>

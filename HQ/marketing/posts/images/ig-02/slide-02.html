<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=IBM+Plex+Mono:wght@400;600&family=Murecho:wght@500;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1080px;
    background: #0D0D0D;
    font-family: 'IBM Plex Mono', monospace;
    color: #F4F4F2;
    overflow: hidden;
    position: relative;
  }
  .content {
    position: absolute;
    top: 80px; left: 80px; right: 80px; bottom: 80px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .label {
    font-family: 'Murecho', sans-serif;
    font-size: 16px;
    color: #888;
    margin-bottom: 32px;
  }
  .divider {
    width: 100%;
    height: 1px;
    background: #222;
    margin-bottom: 32px;
  }
  .price-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  .price-label {
    font-family: 'Murecho', sans-serif;
    font-size: 14px;
    color: #888;
  }
  .price-value {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600;
    font-size: 18px;
    color: #00E87A;
  }
  .statement {
    margin-top: 40px;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 56px;
    color: #F4F4F2;
    line-height: 1.1;
  }
  .divider2 {
    width: 100%;
    height: 1px;
    background: #222;
    margin-top: 40px;
    margin-bottom: 24px;
  }
  .bullet {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    color: #666;
    margin-bottom: 10px;
  }
  .closing {
    margin-top: 20px;
    font-family: 'Murecho', sans-serif;
    font-weight: 500;
    font-size: 15px;
    color: #AAA;
    line-height: 1.7;
  }
</style>
</head>
<body>
  <div class="content">
    <div class="label">まず、旧来のモデルの話をします。</div>
    <div class="divider"></div>
    <div class="price-row">
      <span class="price-label">フリーランスに頼む</span>
      <span class="price-value">¥150,000〜</span>
    </div>
    <div class="price-row">
      <span class="price-label">制作会社に頼む</span>
      <span class="price-value">¥300,000〜</span>
    </div>
    <div class="statement">払った瞬間、<br>関係が終わる。</div>
    <div class="divider2"></div>
    <div class="bullet">更新は別途費用。</div>
    <div class="bullet">スマホ崩れは自分で直す。</div>
    <div class="bullet">問い合わせが来なくても、誰も責任を取らない。</div>
    <div class="closing">制作費を払うのに、<br>成果に誰もコミットしていない。</div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=IBM+Plex+Mono:wght@400;600&family=Murecho:wght@500;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1080px;
    background: #0D0D0D;
    font-family: 'IBM Plex Mono', monospace;
    color: #F4F4F2;
    overflow: hidden;
    position: relative;
  }
  .content {
    position: absolute;
    top: 80px; left: 80px; right: 80px; bottom: 80px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
  }
  .rule-top {
    width: 100%;
    height: 4px;
    background: #00E87A;
    margin-bottom: 56px;
  }
  .main-statement {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 56px;
    color: #F4F4F2;
    line-height: 1.15;
    margin-bottom: 32px;
  }
  .sub-statement {
    font-family: 'Murecho', sans-serif;
    font-weight: 500;
    font-size: 18px;
    color: #888;
    line-height: 1.7;
    margin-bottom: 48px;
  }
  .divider {
    width: 100%;
    height: 1px;
    background: #222;
    margin-bottom: 40px;
  }
  .url {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 32px;
    color: #00E87A;
    margin-bottom: 8px;
  }
  .url-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: #555;
    margin-bottom: 40px;
  }
  .rule-bottom {
    width: 100%;
    height: 4px;
    background: #00E87A;
  }
  .handle {
    position: absolute;
    bottom: 40px; right: 48px;
    font-size: 11px; color: #444;
    font-family: 'IBM Plex Mono', monospace;
  }
</style>
</head>
<body>
  <div class="content">
    <div class="rule-top"></div>
    <div class="main-statement">まず、詳細だけ<br>読んでみてください。</div>
    <div class="sub-statement">申し込みは、<br>納得してからで大丈夫です。</div>
    <div class="divider"></div>
    <div class="url">zeroen.dev</div>
    <div class="url-label">プロフィールのリンクから</div>
    <div class="rule-bottom"></div>
  </div>
  <div class="handle">zeroen.dev</div>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>X JP #6 — MRR Week 1</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=IBM+Plex+Mono:wght@400;500;600&family=Murecho:wght@400;500;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1200px; height: 675px;
    background: #0D0D0D;
    color: #F4F4F2;
    font-family: 'IBM Plex Mono', monospace;
    overflow: hidden;
  }
  body {
    padding: 64px;
    display: flex; flex-direction: column; justify-content: space-between;
    position: relative;
  }
  .eyebrow {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600;
    font-size: 12px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #F4F4F2;
  }
  .main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 48px;
    margin-top: -12px;
  }
  .zero {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 240px;
    line-height: 1;
    letter-spacing: -0.04em;
    color: #F4F4F2;
    position: relative;
    padding-bottom: 14px;
    flex: 0 0 auto;
  }
  .zero::after {
    content: '';
    position: absolute;
    left: 0;
    bottom: 0;
    width: 96px;
    height: 2px;
    background: #00E87A;
  }
  .track {
    flex: 1;
    height: 240px;
    display: flex;
    align-items: center;
    position: relative;
    padding: 0 28px;
  }
  .line {
    flex: 1;
    height: 1px;
    background: #00E87A;
    position: relative;
  }
  .dot {
    position: absolute;
    left: -5px;
    top: 50%;
    transform: translateY(-50%);
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #00E87A;
    box-shadow: 0 0 0 4px rgba(0, 232, 122, 0.14);
  }
  .target {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 120px;
    line-height: 1;
    letter-spacing: -0.03em;
    color: #5A5A58;
    flex: 0 0 auto;
  }
  .support {
    font-family: 'Murecho', 'Hiragino Sans', sans-serif;
    font-weight: 500;
    font-size: 23px;
    color: #8A8A88;
    letter-spacing: 0.01em;
    margin-top: 8px;
  }
  .footer {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }
  .foot-left {
    font-family: 'Murecho', 'Hiragino Sans', sans-serif;
    font-weight: 500;
    font-size: 13px;
    letter-spacing: 0.08em;
    color: #F4F4F2;
  }
  .foot-right {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 500;
    font-size: 12px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #5A5A58;
  }
</style>
</head>
<body>
  <div class="eyebrow">MRR / WEEK 1</div>

  <div class="main">
    <div class="zero">¥0</div>
    <div class="track">
      <div class="line">
        <div class="dot"></div>
      </div>
    </div>
    <div class="target">¥300k</div>
  </div>

  <div class="support">目標はキャンペーン期間で到達する数字</div>

  <div class="footer">
    <div class="foot-left">毎週月曜更新</div>
    <div class="foot-right">ZEROEN.DEV</div>
  </div>
</body>
</html>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#F4F4F2" opacity="0.05"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0D0D0D"/>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Stack labels with connector -->
  <text x="80" y="200" font-family="'IBM Plex Mono', monospace" font-size="13" fill="#6B7280" letter-spacing="2">PRODUCTION STACK</text>

  <!-- Next.js -->
  <text x="80" y="285" font-family="'Syne', sans-serif" font-weight="700" font-size="68" fill="#F4F4F2">Next.js</text>
  <line x1="80" y1="300" x2="80" y2="335" stroke="#00E87A" stroke-width="1.5" opacity="0.5"/>

  <!-- Supabase -->
  <text x="80" y="380" font-family="'Syne', sans-serif" font-weight="700" font-size="68" fill="#9CA3AF">Supabase</text>
  <line x1="80" y1="395" x2="80" y2="430" stroke="#00E87A" stroke-width="1.5" opacity="0.5"/>

  <!-- Stripe -->
  <text x="80" y="475" font-family="'Syne', sans-serif" font-weight="700" font-size="68" fill="#6B7280">Stripe</text>

  <!-- Green vertical accent -->
  <line x1="64" y1="220" x2="64" y2="475" stroke="#00E87A" stroke-width="3" opacity="0.7"/>

  <!-- Right side tag -->
  <rect x="820" y="260" width="280" height="44" rx="4" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="960" y="287" font-family="'IBM Plex Mono', monospace" font-size="12" fill="#00E87A" text-anchor="middle" letter-spacing="1">App Router · EN/JA · RLS</text>

  <rect x="820" y="340" width="280" height="44" rx="4" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="960" y="367" font-family="'IBM Plex Mono', monospace" font-size="12" fill="#6B7280" text-anchor="middle" letter-spacing="1">Auth · Postgres · Storage</text>

  <rect x="820" y="420" width="280" height="44" rx="4" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="960" y="447" font-family="'IBM Plex Mono', monospace" font-size="12" fill="#6B7280" text-anchor="middle" letter-spacing="1">Billing · Webhooks · Portal</text>

  <!-- Divider -->
  <line x1="80" y1="560" x2="400" y2="560" stroke="#1F2937" stroke-width="1"/>

  <!-- Bottom label -->
  <text x="80" y="590" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#374151" letter-spacing="1">ZEROEN PRODUCTION STACK — 2026</text>

  <!-- ZeroEn wordmark -->
  <text x="1100" y="610" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#374151" text-anchor="end">ZeroEn</text>
</svg>

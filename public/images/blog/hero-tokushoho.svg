<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#F4F4F2" opacity="0.05"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0D0D0D"/>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Green left accent bar -->
  <rect x="80" y="120" width="4" height="300" fill="#00E87A" opacity="0.6"/>

  <!-- Main kanji -->
  <text x="108" y="300" font-family="'Murecho', 'Noto Sans JP', sans-serif" font-weight="700" font-size="120" fill="#F4F4F2" opacity="0.9">特定商取引法</text>

  <!-- English label -->
<text x="108" y="360" font-family="'IBM Plex Mono', monospace" font-size="14" fill="#00E87A" letter-spacing="3">TOKUSHOHO — JAPAN COMMERCIAL DISCLOSURE LAW</text>

  <!-- 6 dots row -->
  <circle cx="108" cy="420" r="5" fill="#00E87A"/>
  <circle cx="138" cy="420" r="5" fill="#00E87A" opacity="0.7"/>
  <circle cx="168" cy="420" r="5" fill="#00E87A" opacity="0.5"/>
  <circle cx="198" cy="420" r="5" fill="#374151"/>
  <circle cx="228" cy="420" r="5" fill="#374151"/>
  <circle cx="258" cy="420" r="5" fill="#374151"/>
  <text x="282" y="426" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#6B7280">6 required fields</text>

  <!-- Divider -->
  <line x1="80" y1="560" x2="400" y2="560" stroke="#1F2937" stroke-width="1"/>

  <!-- Bottom label -->
  <text x="80" y="590" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#374151" letter-spacing="1">GUIDE FOR FOREIGN FOUNDERS IN JAPAN</text>

  <!-- ZeroEn wordmark -->
  <text x="1100" y="610" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#374151" text-anchor="end">ZeroEn</text>
</svg>

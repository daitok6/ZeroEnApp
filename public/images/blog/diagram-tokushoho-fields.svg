<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" width="900" height="380">
  <!-- Background -->
  <rect width="900" height="380" fill="#111827" rx="8"/>
  <rect x="1" y="1" width="898" height="378" rx="7" fill="none" stroke="#1F2937" stroke-width="1"/>

  <!-- Title -->
  <text x="40" y="44" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#00E87A" letter-spacing="2">TOKUSHOHO — 6 REQUIRED DISCLOSURE FIELDS</text>
  <line x1="40" y1="56" x2="860" y2="56" stroke="#1F2937" stroke-width="1"/>

  <!-- 2×3 grid of boxes. Row 1 y=80, Row 2 y=220. Cols x=40, 330, 620 -->

  <!-- Box 1: 販売業者名 -->
  <rect x="40" y="72" width="250" height="120" rx="6" fill="#0D0D0D" stroke="#374151" stroke-width="1"/>
  <text x="60" y="104" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#00E87A" letter-spacing="1">01</text>
  <text x="60" y="128" font-family="'Murecho', sans-serif" font-size="18" font-weight="700" fill="#F4F4F2">販売業者名</text>
  <text x="60" y="150" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#6B7280">Seller name</text>
  <text x="60" y="168" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#374151">Individual or company legal name</text>

  <!-- Box 2: 所在地 -->
  <rect x="325" y="72" width="250" height="120" rx="6" fill="#0D0D0D" stroke="#374151" stroke-width="1"/>
  <text x="345" y="104" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#00E87A" letter-spacing="1">02</text>
  <text x="345" y="128" font-family="'Murecho', sans-serif" font-size="18" font-weight="700" fill="#F4F4F2">所在地</text>
  <text x="345" y="150" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#6B7280">Business address</text>
  <text x="345" y="168" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#374151">Full registered address required</text>

  <!-- Box 3: 連絡先 -->
  <rect x="610" y="72" width="250" height="120" rx="6" fill="#0D0D0D" stroke="#374151" stroke-width="1"/>
  <text x="630" y="104" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#00E87A" letter-spacing="1">03</text>
  <text x="630" y="128" font-family="'Murecho', sans-serif" font-size="18" font-weight="700" fill="#F4F4F2">連絡先</text>
  <text x="630" y="150" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#6B7280">Contact info</text>
  <text x="630" y="168" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#374151">Phone number and/or email</text>

  <!-- Box 4: 価格 -->
  <rect x="40" y="212" width="250" height="120" rx="6" fill="#0D0D0D" stroke="#374151" stroke-width="1"/>
  <text x="60" y="244" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#00E87A" letter-spacing="1">04</text>
  <text x="60" y="268" font-family="'Murecho', sans-serif" font-size="18" font-weight="700" fill="#F4F4F2">価格</text>
  <text x="60" y="290" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#6B7280">Price (incl. tax)</text>
  <text x="60" y="308" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#374151">All fees must be listed explicitly</text>

  <!-- Box 5: 支払方法 -->
  <rect x="325" y="212" width="250" height="120" rx="6" fill="#0D0D0D" stroke="#374151" stroke-width="1"/>
  <text x="345" y="244" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#00E87A" letter-spacing="1">05</text>
  <text x="345" y="268" font-family="'Murecho', sans-serif" font-size="18" font-weight="700" fill="#F4F4F2">支払方法</text>
  <text x="345" y="290" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#6B7280">Payment methods</text>
  <text x="345" y="308" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#374151">Credit card, bank transfer, etc.</text>

  <!-- Box 6: 商品引渡時期 -->
  <rect x="610" y="212" width="250" height="120" rx="6" fill="#0D0D0D" stroke="#374151" stroke-width="1"/>
  <text x="630" y="244" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#00E87A" letter-spacing="1">06</text>
  <text x="630" y="268" font-family="'Murecho', sans-serif" font-size="18" font-weight="700" fill="#F4F4F2">引渡時期</text>
  <text x="630" y="290" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#6B7280">Delivery timeline</text>
  <text x="630" y="308" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#374151">When service/product is delivered</text>

  <!-- Footer note -->
  <text x="40" y="360" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#374151">Required by 特定商取引法 (Act on Specified Commercial Transactions) for all online commerce in Japan</text>
</svg>

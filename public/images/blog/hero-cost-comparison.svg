<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#F4F4F2" opacity="0.05"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0D0D0D"/>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Green accent line -->
  <line x1="80" y1="420" x2="580" y2="420" stroke="#00E87A" stroke-width="2" stroke-dasharray="8 6" opacity="0.4"/>
  <line x1="580" y1="420" x2="1120" y2="200" stroke="#00E87A" stroke-width="2" opacity="0.6"/>

  <!-- ¥8M label (left) -->
  <text x="80" y="400" font-family="'IBM Plex Mono', monospace" font-size="13" fill="#6B7280" letter-spacing="2">TOKYO AGENCY</text>
  <text x="80" y="470" font-family="'Syne', sans-serif" font-weight="700" font-size="72" fill="#374151">¥8M</text>

  <!-- Arrow -->
  <text x="588" y="330" font-family="'IBM Plex Mono', monospace" font-size="32" fill="#00E87A" opacity="0.7">→</text>

  <!-- ¥880k label (right) -->
  <text x="680" y="180" font-family="'IBM Plex Mono', monospace" font-size="13" fill="#00E87A" letter-spacing="2">ZEROEN GROWTH</text>
  <text x="680" y="248" font-family="'Syne', sans-serif" font-weight="700" font-size="72" fill="#F4F4F2">¥880k</text>
  <text x="680" y="290" font-family="'IBM Plex Mono', monospace" font-size="14" fill="#6B7280">3–4 weeks · fixed price · no equity</text>

  <!-- Divider -->
  <line x1="80" y1="560" x2="400" y2="560" stroke="#1F2937" stroke-width="1"/>

  <!-- Bottom label -->
  <text x="80" y="590" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#374151" letter-spacing="1">BILINGUAL SAAS MVP COST — TOKYO 2026</text>

  <!-- ZeroEn wordmark -->
  <text x="1100" y="610" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#374151" text-anchor="end">ZeroEn</text>
</svg>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1500px;
    height: 500px;
    background: #0D0D0D;
    font-family: 'IBM Plex Mono', monospace;
    overflow: hidden;
  }
  .banner {
    width: 1500px;
    height: 500px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 100px;
    position: relative;
  }
  .hero {
    font-size: 72px;
    font-weight: 900;
    color: #F4F4F2;
    line-height: 1.05;
    letter-spacing: -0.01em;
    margin-bottom: 20px;
  }
  .sub {
    font-size: 18px;
    font-weight: 400;
    color: #6B7280;
    letter-spacing: 0.08em;
  }
  .sub span {
    color: #00E87A;
  }
  .logo {
    position: absolute;
    bottom: 40px;
    right: 80px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .logo svg {
    width: 44px;
    height: 44px;
  }
  .logo-text {
    font-size: 26px;
    font-weight: 500;
    color: #F4F4F2;
    letter-spacing: 0.04em;
  }
  .logo-text span {
    color: #00E87A;
    font-weight: 700;
  }
  .accent-line {
    width: 60px;
    height: 4px;
    background: #00E87A;
    margin-bottom: 28px;
  }
</style>
</head>
<body>
  <div class="banner">
    <div class="accent-line"></div>
    <div class="hero">Your idea.<br>Built free.</div>
    <div class="sub">10% equity &nbsp;·&nbsp; <span>$50/mo</span> &nbsp;·&nbsp; No engineers needed.</div>
    <div class="logo">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <g transform="rotate(2, 50, 50)">
          <circle cx="50" cy="50" r="38" fill="none" stroke="#F4F4F2" stroke-width="8" stroke-linecap="round"/>
          <line x1="-2" y1="41" x2="102" y2="41" stroke="#00E87A" stroke-width="8" stroke-linecap="round"/>
          <line x1="-2" y1="59" x2="102" y2="59" stroke="#00E87A" stroke-width="8" stroke-linecap="round"/>
        </g>
      </svg>
      <span class="logo-text">Zero<span>En</span></span>
    </div>
  </div>
</body>
</html>

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;

      padding: 60px 48px;
    }
    h1 {

      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #444;
      margin-bottom: 64px;
    }
    .section {

    }
    .section-header {
      display: flex;
      align-items: baseline;
      gap: 16px;
      margin-bottom: 28px;
    }
    .section-label {
      font-size: 13px;
      font-weight: 700;
      color: #F4F4F2;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .section-desc {
      font-size: 12px;
      color: #444;
    }
    .preview-row {
      display: flex;
      gap: 16px;
      align-items: stretch;
    }
    .preview-box {

      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      padding: 48px 32px;
    }
    .preview-box.dark  { background: #0D0D0D; border: 1px solid #1a1a1a; }
    .preview-box.light { background: #F4F4F2; }
    .size-row {
      display: flex;

      align-items: center;
      background: #0D0D0D;
      border: 1px solid #1a1a1a;
      border-radius: 6px;
      padding: 32px 40px;

      color: #333;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-top: 12px;
      text-align: center;
    }
    .size-item { text-align: center; }
    .divider {

      border-top: 1px solid #1c1c1c;

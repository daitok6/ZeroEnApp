<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1500px;
    height: 500px;
    background: #0D0D0D;
    font-family: 'IBM Plex Mono', monospace;
    overflow: hidden;
  }
  .banner {
    width: 1500px;
    height: 500px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 100px;
    position: relative;
  }
  .label {
    font-size: 12px;
    font-weight: 500;
    color: #374151;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 32px;
  }
  .terminal-line {
    font-size: 36px;
    font-weight: 400;
    color: #6B7280;
    margin-bottom: 12px;
    letter-spacing: -0.01em;
  }
  .terminal-line .prompt { color: #00E87A; }
  .terminal-line .cmd { color: #F4F4F2; }
  .terminal-line .flag { color: #9CA3AF; }
  .terminal-line .val { color: #00E87A; }
  .cursor {
    display: inline-block;
    width: 3px;
    height: 36px;
    background: #00E87A;
    vertical-align: middle;
    margin-left: 4px;
  }
  .output {
    font-size: 15px;
    font-weight: 400;
    color: #374151;
    margin-top: 24px;
    letter-spacing: 0.02em;
  }
  .output .ok { color: #00E87A; }
  .logo {
    position: absolute;
    bottom: 44px;
    right: 80px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .logo svg { width: 40px; height: 40px; }
  .logo-text {
    font-size: 24px;
    font-weight: 500;
    color: #F4F4F2;
    letter-spacing: 0.04em;
  }
  .logo-text span { color: #00E87A; font-weight: 700; }
</style>
</head>
<body>
  <div class="banner">
    <div class="label">zeroen.dev</div>
    <div class="terminal-line">
      <span class="prompt">$</span>
      <span class="cmd"> zeroen build</span>
      <span class="flag"> --cost</span><span class="val">=0</span>
      <span class="flag"> --equity</span><span class="val">=10%</span>
      <span class="flag"> --time</span><span class="val">=4wks</span>
      <span class="cursor"></span>
    </div>
    <div class="output">
      <span class="ok">✓</span> MVP scaffolded &nbsp;&nbsp;
      <span class="ok">✓</span> Deployed to Vercel &nbsp;&nbsp;
      <span class="ok">✓</span> Cost to founder: $0
    </div>
    <div class="logo">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <g transform="rotate(2, 50, 50)">
          <circle cx="50" cy="50" r="38" fill="none" stroke="#F4F4F2" stroke-width="8" stroke-linecap="round"/>
          <line x1="-2" y1="41" x2="102" y2="41" stroke="#00E87A" stroke-width="8" stroke-linecap="round"/>
          <line x1="-2" y1="59" x2="102" y2="59" stroke="#00E87A" stroke-width="8" stroke-linecap="round"/>
        </g>
      </svg>
      <span class="logo-text">Zero<span>En</span></span>
    </div>
  </div>
</body>
</html>
